<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 200" shape-rendering="crispEdges">

<style>
  /* Gear left — slow clockwise */
  #gear-l {
    transform-box: fill-box;
    transform-origin: center;
    animation: rotate-cw 9s linear infinite;
  }
  /* Gear right — counter-clockwise, slightly different speed */
  #gear-r {
    transform-box: fill-box;
    transform-origin: center;
    animation: rotate-ccw 11s linear infinite;
  }
  /* Mercury drops — gentle pulse, like surface tension */
  #mercury {
    animation: mercury-pulse 2.8s ease-in-out infinite alternate;
  }
  #mercury-trail {
    animation: mercury-drip 2.8s ease-in-out infinite alternate;
    animation-delay: 0.4s;
  }
  /* Candle flames — irregular flicker */
  #flames-outer {
    transform-box: fill-box;
    transform-origin: center bottom;
    animation: flicker-a 0.7s ease-in-out infinite alternate;
  }
  #flames-inner {
    transform-box: fill-box;
    transform-origin: center bottom;
    animation: flicker-b 1.1s ease-in-out infinite alternate;
    animation-delay: 0.2s;
  }

  @keyframes rotate-cw {
    from { transform: rotate(0deg); }
    to   { transform: rotate(360deg); }
  }
  @keyframes rotate-ccw {
    from { transform: rotate(0deg); }
    to   { transform: rotate(-360deg); }
  }
  @keyframes mercury-pulse {
    0%   { transform: translateY(0px);   opacity: 1; }
    40%  { transform: translateY(2px);   opacity: 0.85; }
    100% { transform: translateY(4px);   opacity: 0.7; }
  }
  @keyframes mercury-drip {
    0%   { transform: translateY(0px); opacity: 0.9; }
    60%  { transform: translateY(3px); opacity: 0.6; }
    100% { transform: translateY(6px); opacity: 0.4; }
  }
  @keyframes flicker-a {
    0%   { transform: scaleY(1)    scaleX(1);    opacity: 1; }
    30%  { transform: scaleY(0.88) scaleX(1.08); opacity: 0.8; }
    60%  { transform: scaleY(1.06) scaleX(0.94); opacity: 0.95; }
    100% { transform: scaleY(0.92) scaleX(1.04); opacity: 0.75; }
  }
  @keyframes flicker-b {
    0%   { transform: scaleY(1.05) scaleX(0.96); opacity: 0.9; }
    50%  { transform: scaleY(0.85) scaleX(1.1);  opacity: 0.65; }
    100% { transform: scaleY(1)    scaleX(1);    opacity: 1; }
  }
</style>

  <!-- 8-bit gears with mercury drops — Castlevania aesthetic -->
  <rect width="320" height="200" fill="#080808"/>

  <!-- Brick pattern background -->
  <g fill="#121212">
    <rect x="0" y="0" width="40" height="20"/><rect x="44" y="0" width="40" height="20"/>
    <rect x="88" y="0" width="40" height="20"/><rect x="132" y="0" width="40" height="20"/>
    <rect x="176" y="0" width="40" height="20"/><rect x="220" y="0" width="40" height="20"/>
    <rect x="264" y="0" width="40" height="20"/>
    <rect x="20" y="24" width="40" height="20"/><rect x="64" y="24" width="40" height="20"/>
    <rect x="108" y="24" width="40" height="20"/><rect x="152" y="24" width="40" height="20"/>
    <rect x="196" y="24" width="40" height="20"/><rect x="240" y="24" width="40" height="20"/>
    <rect x="284" y="24" width="36" height="20"/>
  </g>

  <!-- Large gear left — rotates CW -->
  <g id="gear-l" fill="#2a2a28">
    <rect x="60" y="70" width="8" height="8"/><rect x="68" y="62" width="8" height="8"/>
    <rect x="76" y="58" width="16" height="8"/><rect x="92" y="62" width="8" height="8"/>
    <rect x="100" y="70" width="8" height="8"/><rect x="104" y="78" width="8" height="16"/>
    <rect x="100" y="94" width="8" height="8"/><rect x="92" y="102" width="8" height="8"/>
    <rect x="76" y="106" width="16" height="8"/><rect x="68" y="102" width="8" height="8"/>
    <rect x="60" y="94" width="8" height="8"/><rect x="56" y="78" width="8" height="16"/>
    <rect x="72" y="74" width="24" height="24" fill="#1a1a18"/>
    <rect x="80" y="80" width="8" height="8" fill="#080808"/>
  </g>

  <!-- Large gear right — rotates CCW -->
  <g id="gear-r" fill="#2a2a28">
    <rect x="180" y="80" width="8" height="8"/><rect x="188" y="72" width="8" height="8"/>
    <rect x="196" y="68" width="16" height="8"/><rect x="212" y="72" width="8" height="8"/>
    <rect x="220" y="80" width="8" height="8"/><rect x="224" y="88" width="8" height="16"/>
    <rect x="220" y="104" width="8" height="8"/><rect x="212" y="112" width="8" height="8"/>
    <rect x="196" y="116" width="16" height="8"/><rect x="188" y="112" width="8" height="8"/>
    <rect x="180" y="104" width="8" height="8"/><rect x="176" y="88" width="8" height="16"/>
    <rect x="192" y="84" width="24" height="24" fill="#1a1a18"/>
    <rect x="200" y="90" width="8" height="8" fill="#080808"/>
  </g>

  <!-- Mercury drops — pulsing -->
  <g id="mercury" fill="#c4c4c4">
    <rect x="120" y="88" width="8" height="8"/><rect x="128" y="92" width="4" height="4"/>
    <rect x="140" y="96" width="6" height="6"/><rect x="150" y="100" width="4" height="4"/>
    <rect x="156" y="106" width="8" height="8"/><rect x="134" y="108" width="4" height="4"/>
    <rect x="124" y="112" width="6" height="6"/>
  </g>

  <!-- Mercury trail — drips down -->
  <g id="mercury-trail" fill="#8a8a8a">
    <rect x="144" y="120" width="4" height="8"/><rect x="148" y="128" width="4" height="4"/>
    <rect x="140" y="132" width="4" height="8"/><rect x="144" y="140" width="4" height="4"/>
    <rect x="136" y="144" width="4" height="8"/>
  </g>

  <!-- Pixel candelabra -->
  <g fill="#c9a84c">
    <rect x="260" y="130" width="4" height="24"/>
    <rect x="252" y="126" width="4" height="8"/><rect x="268" y="126" width="4" height="8"/>
    <rect x="256" y="126" width="12" height="4"/>
  </g>

  <!-- Flames outer glow — flicker A -->
  <g id="flames-outer" fill="#d4310a">
    <rect x="250" y="118" width="8" height="8"/><rect x="266" y="118" width="8" height="8"/>
    <rect x="258" y="122" width="8" height="8"/>
  </g>
  <!-- Flames inner tip — flicker B -->
  <g id="flames-inner" fill="#e85d2c">
    <rect x="252" y="116" width="4" height="6"/>
    <rect x="268" y="116" width="4" height="6"/>
    <rect x="260" y="118" width="4" height="6"/>
  </g>

  <!-- Floor stones -->
  <g fill="#1a1a18">
    <rect x="0" y="168" width="320" height="4"/>
    <rect x="0" y="176" width="60" height="24"/><rect x="64" y="176" width="48" height="24"/>
    <rect x="116" y="176" width="56" height="24"/><rect x="176" y="176" width="44" height="24"/>
    <rect x="224" y="176" width="52" height="24"/><rect x="280" y="176" width="40" height="24"/>
  </g>

  <!-- Chain links top -->
  <g fill="#3a3a38">
    <rect x="40" y="48" width="4" height="8"/><rect x="44" y="52" width="8" height="4"/>
    <rect x="52" y="48" width="4" height="8"/>
    <rect x="240" y="48" width="4" height="8"/><rect x="244" y="52" width="8" height="4"/>
    <rect x="252" y="48" width="4" height="8"/>
  </g>

</svg>
