<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 162" shape-rendering="crispEdges">

<style>
  .lbl { font-family: 'Courier New', Courier, monospace; font-size: 6.5px; fill: #3a3a38; text-transform: uppercase; letter-spacing: 0.09em; }
  .cap { font-family: 'Courier New', Courier, monospace; font-size: 5px; fill: #222220; text-transform: uppercase; letter-spacing: 0.14em; }
</style>

<!-- Sky -->
<rect width="280" height="162" fill="#060606"/>

<!-- Stars -->
<g fill="#181816">
  <rect x="10" y="10" width="1" height="1"/>
  <rect x="32" y="16" width="1" height="1"/>
  <rect x="65" y="8" width="1" height="1"/>
  <rect x="100" y="20" width="1" height="1"/>
  <rect x="148" y="10" width="1" height="1"/>
  <rect x="190" y="14" width="1" height="1"/>
  <rect x="230" y="8" width="1" height="1"/>
  <rect x="260" y="20" width="1" height="1"/>
  <rect x="272" y="10" width="1" height="1"/>
</g>

<!-- === CENTRAL ELÉCTRICA === -->
<!-- Chimney 1 (tall) -->
<rect x="16" y="48" width="12" height="70" fill="#1a1a18"/>
<rect x="16" y="48" width="12" height="4" fill="#242422"/>
<!-- Steam cap -->
<rect x="14" y="44" width="16" height="4" fill="#0e0e0c"/>
<!-- Chimney 2 (shorter) -->
<rect x="36" y="62" width="9" height="56" fill="#131311"/>
<rect x="36" y="62" width="9" height="3" fill="#1c1c1a"/>
<!-- Main building -->
<rect x="8" y="90" width="60" height="28" fill="#1e1e1c"/>
<rect x="8" y="90" width="60" height="4" fill="#282826"/>
<rect x="8" y="90" width="4" height="28" fill="#222220"/>
<!-- Industrial windows -->
<g fill="#0e0e0c">
  <rect x="14" y="97" width="8" height="5"/>
  <rect x="26" y="97" width="8" height="5"/>
  <rect x="14" y="108" width="8" height="5"/>
  <rect x="26" y="108" width="8" height="5"/>
</g>
<!-- Vent panel -->
<rect x="40" y="95" width="22" height="20" fill="#0a0a08"/>
<rect x="42" y="97" width="8" height="6" fill="#0e0e0c"/>
<rect x="52" y="97" width="8" height="6" fill="#0e0e0c"/>
<rect x="42" y="106" width="18" height="6" fill="#0e0e0c"/>
<!-- Electrical tower -->
<rect x="64" y="72" width="3" height="46" fill="#232321"/>
<rect x="56" y="78" width="19" height="2" fill="#232321"/>
<rect x="58" y="85" width="15" height="2" fill="#232321"/>
<!-- Power lines (dotted) -->
<g fill="#191917">
  <rect x="76" y="79" width="3" height="1"/>
  <rect x="83" y="79" width="3" height="1"/>
  <rect x="90" y="79" width="3" height="1"/>
</g>

<!-- === HOTEL === -->
<!-- Penthouse setback -->
<rect x="104" y="24" width="50" height="8" fill="#1c1c1a"/>
<rect x="104" y="24" width="50" height="3" fill="#232321"/>
<!-- Main tower -->
<rect x="96" y="30" width="66" height="88" fill="#161614"/>
<rect x="96" y="30" width="66" height="4" fill="#222220"/>
<rect x="96" y="30" width="4" height="88" fill="#111110"/>
<!-- Window grid (5 cols × 7 rows) -->
<g fill="#0d0d0b">
  <rect x="102" y="36" width="8" height="6"/><rect x="114" y="36" width="8" height="6"/>
  <rect x="126" y="36" width="8" height="6"/><rect x="138" y="36" width="8" height="6"/>
  <rect x="150" y="36" width="8" height="6"/>
  <rect x="102" y="46" width="8" height="6"/><rect x="114" y="46" width="8" height="6"/>
  <rect x="126" y="46" width="8" height="6"/><rect x="138" y="46" width="8" height="6"/>
  <rect x="150" y="46" width="8" height="6"/>
  <rect x="102" y="56" width="8" height="6"/><rect x="114" y="56" width="8" height="6"/>
  <rect x="126" y="56" width="8" height="6"/><rect x="138" y="56" width="8" height="6"/>
  <rect x="150" y="56" width="8" height="6"/>
  <rect x="102" y="66" width="8" height="6"/><rect x="114" y="66" width="8" height="6"/>
  <rect x="126" y="66" width="8" height="6"/><rect x="138" y="66" width="8" height="6"/>
  <rect x="150" y="66" width="8" height="6"/>
  <rect x="102" y="76" width="8" height="6"/><rect x="114" y="76" width="8" height="6"/>
  <rect x="126" y="76" width="8" height="6"/><rect x="138" y="76" width="8" height="6"/>
  <rect x="150" y="76" width="8" height="6"/>
  <rect x="102" y="86" width="8" height="6"/><rect x="114" y="86" width="8" height="6"/>
  <rect x="138" y="86" width="8" height="6"/><rect x="150" y="86" width="8" height="6"/>
  <rect x="102" y="96" width="8" height="6"/>
  <rect x="150" y="96" width="8" height="6"/>
</g>
<!-- Lit windows (amber, very faint) -->
<rect x="126" y="86" width="8" height="6" fill="#c9a84c" opacity="0.22"/>
<rect x="114" y="56" width="8" height="6" fill="#c9a84c" opacity="0.14"/>
<rect x="138" y="96" width="8" height="6" fill="#c9a84c" opacity="0.12"/>
<!-- Entrance -->
<rect x="116" y="110" width="24" height="8" fill="#1e1e1c"/>
<rect x="120" y="114" width="16" height="4" fill="#0d0d0b"/>

<!-- === RESTAURANTE-BAR (1980s) === -->
<!-- Main body -->
<rect x="174" y="80" width="72" height="38" fill="#131311"/>
<!-- Awning / sign strip (faded 80s red) -->
<rect x="174" y="80" width="72" height="12" fill="#221616"/>
<rect x="178" y="83" width="64" height="6" fill="#2c1c1c"/>
<!-- Abstract 80s pixel lettering on sign -->
<g fill="#3a2020">
  <rect x="182" y="84" width="3" height="4"/>
  <rect x="187" y="84" width="3" height="4"/>
  <rect x="193" y="84" width="5" height="4"/>
  <rect x="201" y="84" width="3" height="4"/>
  <rect x="207" y="84" width="3" height="4"/>
  <rect x="214" y="84" width="5" height="4"/>
  <rect x="222" y="84" width="3" height="4"/>
  <rect x="228" y="84" width="3" height="4"/>
</g>
<!-- Horizontal 80s facade stripes -->
<rect x="174" y="96" width="72" height="2" fill="#191918"/>
<rect x="174" y="104" width="72" height="2" fill="#191918"/>
<rect x="174" y="112" width="72" height="2" fill="#191918"/>
<!-- Display windows -->
<g fill="#0d0d0b">
  <rect x="180" y="98" width="20" height="12"/>
  <rect x="204" y="98" width="20" height="12"/>
</g>
<!-- Door -->
<rect x="232" y="108" width="10" height="10" fill="#0a0a08"/>
<rect x="233" y="109" width="7" height="8" fill="#c9a84c" opacity="0.04"/>

<!-- === GROUND === -->
<rect x="0" y="118" width="280" height="3" fill="#2a2a28"/>
<rect x="0" y="121" width="280" height="41" fill="#080807"/>
<!-- Pavement sections (archaeological cross-section) -->
<g fill="#0e0e0d">
  <rect x="0" y="121" width="80" height="20"/>
  <rect x="84" y="121" width="86" height="20"/>
  <rect x="174" y="121" width="106" height="20"/>
</g>
<g fill="#050504">
  <rect x="80" y="121" width="4" height="20"/>
  <rect x="170" y="121" width="4" height="20"/>
</g>

<!-- Annotation dashes (buildings → labels) -->
<g fill="#1c1c1a">
  <rect x="40" y="144" width="2" height="2"/>
  <rect x="40" y="148" width="2" height="2"/>
  <rect x="129" y="144" width="2" height="2"/>
  <rect x="129" y="148" width="2" height="2"/>
  <rect x="210" y="144" width="2" height="2"/>
  <rect x="210" y="148" width="2" height="2"/>
</g>

<!-- Labels -->
<text class="lbl" x="40" y="158" text-anchor="middle">INFRAESTRUCTURA</text>
<text class="lbl" x="129" y="158" text-anchor="middle">HOSPITALIDAD</text>
<text class="lbl" x="210" y="158" text-anchor="middle">OCIO</text>

<!-- Caption -->
<text class="cap" x="5" y="10">ARQUEOLOGÍA DEL PRESENTE · TLALPAN, CDMX</text>

</svg>
