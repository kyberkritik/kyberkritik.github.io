<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 200" shape-rendering="crispEdges">

<style>
  /* Signal rings — staggered outward pulse */
  #sig1 {
    animation: signal-pulse 1.8s ease-out infinite;
  }
  #sig2 {
    animation: signal-pulse 1.8s ease-out infinite;
    animation-delay: 0.5s;
  }
  #sig3 {
    animation: signal-pulse 1.8s ease-out infinite;
    animation-delay: 1.0s;
  }
  /* Antenna blink — crisp pixel flash */
  #ant-blink {
    animation: ant-flash 2.2s step-start infinite;
  }
  /* Bat — float + slow drift */
  #bat {
    transform-box: fill-box;
    transform-origin: center;
    animation: bat-drift 2.4s ease-in-out infinite alternate;
  }
  /* Candle flames — two layers, slightly offset timing */
  #flame-base {
    transform-box: fill-box;
    transform-origin: center bottom;
    animation: flicker-a 0.75s ease-in-out infinite alternate;
  }
  #flame-tip {
    transform-box: fill-box;
    transform-origin: center bottom;
    animation: flicker-b 1.05s ease-in-out infinite alternate;
    animation-delay: 0.15s;
  }
  /* Tuning needle — slow sweep across frequency dial */
  #needle {
    transform-box: fill-box;
    transform-origin: center bottom;
    animation: needle-sweep 5.5s ease-in-out infinite alternate;
  }
  /* Power indicator — slow pulse glow */
  #power-led {
    animation: led-pulse 3s ease-in-out infinite alternate;
  }

  @keyframes signal-pulse {
    0%   { opacity: 0.15; }
    15%  { opacity: 1; }
    60%  { opacity: 0.4; }
    100% { opacity: 0.1; }
  }
  @keyframes ant-flash {
    0%,  42% { opacity: 1; }
    45%, 52% { opacity: 0; }
    55%, 100%{ opacity: 1; }
  }
  @keyframes bat-drift {
    0%   { transform: translateY(0px)  rotate(-1.5deg); }
    50%  { transform: translateY(-4px) rotate(0.5deg); }
    100% { transform: translateY(-7px) rotate(2deg); }
  }
  @keyframes flicker-a {
    0%   { transform: scaleY(1)    scaleX(1);    opacity: 1; }
    35%  { transform: scaleY(0.85) scaleX(1.1);  opacity: 0.75; }
    70%  { transform: scaleY(1.08) scaleX(0.92); opacity: 0.95; }
    100% { transform: scaleY(0.9)  scaleX(1.05); opacity: 0.8; }
  }
  @keyframes flicker-b {
    0%   { transform: scaleY(1.1)  scaleX(0.9);  opacity: 0.85; }
    45%  { transform: scaleY(0.8)  scaleX(1.12); opacity: 0.6; }
    100% { transform: scaleY(1.02) scaleX(0.98); opacity: 1; }
  }
  @keyframes needle-sweep {
    0%   { transform: translateX(-10px); }
    100% { transform: translateX(10px); }
  }
  @keyframes led-pulse {
    0%   { opacity: 0.6; }
    100% { opacity: 1; }
  }
  /* Schema dot — amber pulsing indicator, clickable */
  #schema-dot {
    cursor: pointer;
    animation: schema-pulse 1.6s ease-in-out infinite alternate;
  }
  @keyframes schema-pulse {
    0%   { opacity: 0.35; }
    100% { opacity: 1; }
  }
  #power-led-button {
    cursor: pointer;
  }
  #schema-hand {
    transform-box: fill-box;
    transform-origin: center;
    animation: hand-nudge 1.2s ease-in-out infinite alternate;
  }
  #read-hand {
    transform-box: fill-box;
    transform-origin: center;
    animation: hand-nudge-read 1.25s ease-in-out infinite alternate;
  }
  @keyframes hand-nudge {
    0%   { transform: translateX(0px); opacity: 0.72; }
    100% { transform: translateX(-3px); opacity: 1; }
  }
  @keyframes hand-nudge-read {
    0%   { transform: translateX(0px); opacity: 0.72; }
    100% { transform: translateX(3px); opacity: 1; }
  }
</style>

  <!-- El Muzak — Radio fantasma, Castlevania/Weimar broadcast -->
