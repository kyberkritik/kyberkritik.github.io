<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mercurio en los engranajes — J.C. Latenz</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Source+Serif+4:ital,opsz,wght@0,8..60,300;0,8..60,400;0,8..60,600;1,8..60,300;1,8..60,400&family=JetBrains+Mono:wght@300;400&family=Inter:wght@300;400;500;600&display=swap');

  /* ═══════════════════════════════════════
     RESET & ROOT
     ═══════════════════════════════════════ */
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --bg: #0a0a0a;
    --bg-card: #111111;
    --bg-card-hover: #1a1a1a;
    --fg: #e8e6e1;
    --fg-dim: #8a8780;
    --fg-muted: #5a5854;
    --accent: #d4310a;
    --accent-warm: #e85d2c;
    --accent-gold: #c9a84c;
    --accent-cold: #2a6f97;
    --border: #2a2a28;
    --border-light: #3a3a38;
    --font-body: 'Source Serif 4', 'Georgia', serif;
    --font-sans: 'Inter', -apple-system, sans-serif;
    --font-mono: 'JetBrains Mono', monospace;
    --line-height: 1.72;
    --letter-spacing: 0.01em;
    --max-read: 38rem;
  }

  html {
    font-size: 17px;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
  }

  body {
    background: var(--bg);
    color: var(--fg);
    font-family: var(--font-body);
    line-height: var(--line-height);
    letter-spacing: var(--letter-spacing);
    min-height: 100vh;
    overflow-x: hidden;
  }

  ::selection {
    background: var(--accent);
    color: #fff;
  }

  /* ═══════════════════════════════════════
     HEADER — Weimar broadsheet style
     ═══════════════════════════════════════ */
  .site-header {
    border-bottom: 3px solid var(--fg);
    padding: 2.4rem 2rem 1.6rem;
    position: relative;
    overflow: hidden;
  }

  .site-header::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 4px;
    background: var(--accent);
  }

  .header-date {
    font-family: var(--font-mono);
    font-size: 0.7rem;
    font-weight: 300;
    color: var(--fg-dim);
    letter-spacing: 0.18em;
    text-transform: uppercase;
    margin-bottom: 0.6rem;
  }

  .header-title {
    font-family: var(--font-sans);
    font-size: clamp(1.6rem, 4vw, 2.8rem);
    font-weight: 600;
    line-height: 1.15;
    color: var(--fg);
    letter-spacing: -0.02em;
    max-width: 52rem;
  }

  .header-title span.mercury {
    color: var(--accent);
  }

  .header-subtitle {
    font-family: var(--font-sans);
    font-size: 0.82rem;
    font-weight: 300;
    color: var(--fg-dim);
    margin-top: 0.7rem;
    letter-spacing: 0.06em;
    text-transform: uppercase;
  }

  .header-author {
    font-family: var(--font-mono);
    font-size: 0.72rem;
    color: var(--fg-muted);
    letter-spacing: 0.15em;
    text-transform: uppercase;
    margin-top: 1.2rem;
    padding-top: 0.8rem;
    border-top: 1px solid var(--border);
    display: inline-block;
  }

  .header-author strong {
    color: var(--fg-dim);
    font-weight: 400;
  }

  /* ═══════════════════════════════════════
     ZETTELKASTEN GRID
     ═══════════════════════════════════════ */
  .zettel-grid {
    padding: 2rem;
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    gap: 1.2rem;
    max-width: 1800px;
    margin: 0 auto;
  }

  @media (min-width: 2000px) {
    .zettel-grid {
      grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
      gap: 1.4rem;
    }
  }

  @media (max-width: 600px) {
    .zettel-grid {
      grid-template-columns: 1fr;
      padding: 1rem;
      gap: 1rem;
    }
  }

  /* ═══════════════════════════════════════
     ZETTEL CARD
     ═══════════════════════════════════════ */
  .zettel-card {
    background: var(--bg-card);
    border: 1px solid var(--border);
    padding: 1.4rem 1.5rem;
    cursor: pointer;
    transition: all 0.2s ease;
    position: relative;
    display: flex;
    flex-direction: column;
  }

  .zettel-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0;
    width: 3px;
    height: 100%;
    background: var(--accent);
    opacity: 0;
    transition: opacity 0.2s ease;
  }

  .zettel-card:hover {
    background: var(--bg-card-hover);
    border-color: var(--border-light);
    transform: translateY(-1px);
  }

  .zettel-card:hover::before {
    opacity: 1;
  }

  .zettel-id {
    font-family: var(--font-mono);
    font-size: 0.65rem;
    color: var(--accent);
    letter-spacing: 0.12em;
    margin-bottom: 0.6rem;
  }

  .zettel-card-title {
    font-family: var(--font-sans);
    font-size: 1rem;
    font-weight: 500;
    color: var(--fg);
    line-height: 1.35;
    margin-bottom: 0.6rem;
  }

  .zettel-excerpt {
    font-family: var(--font-body);
    font-size: 0.88rem;
    color: var(--fg-dim);
    line-height: 1.55;
    flex: 1;
    display: -webkit-box;
    -webkit-line-clamp: 4;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }

  .zettel-meta {
    font-family: var(--font-mono);
    font-size: 0.62rem;
    color: var(--fg-muted);
    letter-spacing: 0.1em;
    margin-top: 0.9rem;
    padding-top: 0.7rem;
    border-top: 1px solid var(--border);
    display: flex;
    justify-content: space-between;
    text-transform: uppercase;
  }

  .zettel-links-count {
    color: var(--accent-gold);
  }

  /* ═══════════════════════════════════════
     READING VIEW
     ═══════════════════════════════════════ */
  .reading-overlay {
    position: fixed;
    inset: 0;
    background: var(--bg);
    z-index: 100;
    overflow-y: auto;
    opacity: 0;
    visibility: hidden;
    transition: opacity 0.3s ease, visibility 0.3s ease;
  }

  .reading-overlay.active {
    opacity: 1;
    visibility: visible;
  }

  .reading-nav {
    position: sticky;
    top: 0;
    background: var(--bg);
    border-bottom: 1px solid var(--border);
    padding: 0.9rem 2rem;
    display: flex;
    align-items: center;
    justify-content: space-between;
    z-index: 110;
    backdrop-filter: blur(8px);
  }

  .reading-back {
    font-family: var(--font-mono);
    font-size: 0.72rem;
    color: var(--fg-dim);
    letter-spacing: 0.1em;
    text-transform: uppercase;
    background: none;
    border: 1px solid var(--border);
    padding: 0.4rem 1rem;
    cursor: pointer;
    transition: all 0.15s ease;
  }

  .reading-back:hover {
    color: var(--fg);
    border-color: var(--fg-dim);
  }

  .reading-entry-id {
    font-family: var(--font-mono);
    font-size: 0.65rem;
    color: var(--fg-muted);
    letter-spacing: 0.12em;
  }

  .reading-container {
    display: flex;
    justify-content: center;
    padding: 3rem 2rem 6rem;
    gap: 2rem;
  }

  .reading-main {
    max-width: var(--max-read);
    width: 100%;
  }

  .reading-illustration {
    margin-bottom: 2.4rem;
    border: 1px solid var(--border);
    background: #080808;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 1.5rem;
    max-height: 320px;
    overflow: hidden;
  }

  .reading-illustration svg {
    width: 100%;
    max-height: 280px;
    height: auto;
  }

  .reading-meta-block {
    margin-bottom: 2rem;
    padding-bottom: 1.2rem;
    border-bottom: 1px solid var(--border);
  }

  .reading-title {
    font-family: var(--font-sans);
    font-size: clamp(1.5rem, 3.5vw, 2.2rem);
    font-weight: 600;
    line-height: 1.2;
    letter-spacing: -0.02em;
    margin-bottom: 0.7rem;
  }

  .reading-info {
    font-family: var(--font-mono);
    font-size: 0.68rem;
    color: var(--fg-muted);
    letter-spacing: 0.1em;
    text-transform: uppercase;
    display: flex;
    gap: 1.5rem;
    flex-wrap: wrap;
  }

  .reading-body {
    font-family: var(--font-body);
    font-size: 1.05rem;
    line-height: var(--line-height);
    color: var(--fg);
  }

  .reading-body p {
    margin-bottom: 1.3rem;
  }

  .reading-body p:last-child {
    margin-bottom: 0;
  }

  /* Cross-reference links inside text */
  .zettel-link {
    color: var(--accent-gold);
    text-decoration: none;
    border-bottom: 1px dotted var(--accent-gold);
    cursor: pointer;
    transition: color 0.15s;
    position: relative;
  }

  .zettel-link:hover {
    color: var(--accent-warm);
    border-bottom-color: var(--accent-warm);
  }

  /* ═══════════════════════════════════════
     REFERENCE POPUP
     ═══════════════════════════════════════ */
  .ref-popup {
    position: fixed;
    z-index: 200;
    background: #141412;
    border: 1px solid var(--border-light);
    box-shadow: 0 12px 40px rgba(0,0,0,0.6);
    max-width: 400px;
    width: 90vw;
    opacity: 0;
    visibility: hidden;
    transition: opacity 0.2s ease, visibility 0.2s ease;
    pointer-events: none;
  }

  .ref-popup.active {
    opacity: 1;
    visibility: visible;
    pointer-events: auto;
  }

  .ref-popup-header {
    padding: 0.8rem 1rem;
    border-bottom: 1px solid var(--border);
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  .ref-popup-title {
    font-family: var(--font-sans);
    font-size: 0.85rem;
    font-weight: 500;
    color: var(--fg);
  }

  .ref-popup-open {
    font-family: var(--font-mono);
    font-size: 0.6rem;
    color: var(--accent-gold);
    letter-spacing: 0.1em;
    text-transform: uppercase;
    background: none;
    border: 1px solid var(--border);
    padding: 0.25rem 0.6rem;
    cursor: pointer;
    transition: all 0.15s;
  }

  .ref-popup-open:hover {
    border-color: var(--accent-gold);
  }

  .ref-popup-body {
    padding: 1rem;
    font-family: var(--font-body);
    font-size: 0.85rem;
    color: var(--fg-dim);
    line-height: 1.6;
    max-height: 200px;
    overflow-y: auto;
  }

  /* Highlighted match inside the reference popup */
  .ref-highlight {
    background: rgba(201, 168, 76, 0.18);
    color: var(--accent-gold);
    padding: 0 2px;
    font-style: italic;
  }

  .ref-popup-meta {
    padding: 0.5rem 1rem;
    border-top: 1px solid var(--border);
    font-family: var(--font-mono);
    font-size: 0.58rem;
    color: var(--fg-muted);
    letter-spacing: 0.1em;
    text-transform: uppercase;
  }

  /* ═══════════════════════════════════════
     SIDE PANEL (open reference alongside)
     ═══════════════════════════════════════ */
  .side-panel {
    position: fixed;
    top: 0;
    right: 0;
    width: 42vw;
    max-width: 560px;
    height: 100vh;
    background: #0e0e0c;
    border-left: 2px solid var(--accent);
    z-index: 150;
    overflow-y: auto;
    transform: translateX(100%);
    transition: transform 0.3s ease;
  }

  .side-panel.active {
    transform: translateX(0);
  }

  .side-panel-header {
    position: sticky;
    top: 0;
    background: #0e0e0c;
    padding: 0.9rem 1.5rem;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
    z-index: 10;
  }

  .side-panel-close {
    font-family: var(--font-mono);
    font-size: 0.68rem;
    color: var(--fg-dim);
    background: none;
    border: 1px solid var(--border);
    padding: 0.3rem 0.7rem;
    cursor: pointer;
    letter-spacing: 0.08em;
    transition: all 0.15s;
  }

  .side-panel-close:hover {
    color: var(--fg);
    border-color: var(--fg-dim);
  }

  .side-panel-title {
    font-family: var(--font-sans);
    font-size: 0.9rem;
    font-weight: 500;
  }

  .side-panel-body {
    padding: 2rem 1.5rem;
    font-family: var(--font-body);
    font-size: 0.95rem;
    line-height: var(--line-height);
    color: var(--fg);
  }

  .side-panel-body p {
    margin-bottom: 1.2rem;
  }

  @media (max-width: 768px) {
    .side-panel {
      width: 100vw;
      max-width: 100vw;
    }
  }

  /* ═══════════════════════════════════════
     SCROLLBAR
     ═══════════════════════════════════════ */
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: var(--bg); }
  ::-webkit-scrollbar-thumb { background: var(--border-light); }
  ::-webkit-scrollbar-thumb:hover { background: var(--fg-muted); }

  /* ═══════════════════════════════════════
     FOOTER
     ═══════════════════════════════════════ */
  .site-footer {
    border-top: 1px solid var(--border);
    padding: 1.5rem 2rem;
    text-align: center;
    font-family: var(--font-mono);
    font-size: 0.6rem;
    color: var(--fg-muted);
    letter-spacing: 0.15em;
    text-transform: uppercase;
  }
</style>
</head>
<body>

<!-- ═══════════ HEADER ═══════════ -->
<header class="site-header">
  <div class="header-date" id="headerDate"></div>
  <h1 class="header-title">
    <span class="mercury">Mercurio</span> en los engranajes
  </h1>
  <p class="header-subtitle">Fragmentos y latencia de Zettelkasten</p>
  <div class="header-author">
    Un proyecto de fragmentos de texto por <strong>J.C. Latenz + Opus 4.6</strong>
  </div>
</header>

<!-- ═══════════ ZETTEL GRID ═══════════ -->
<main class="zettel-grid" id="zettelGrid"></main>

<!-- ═══════════ READING VIEW ═══════════ -->
<div class="reading-overlay" id="readingOverlay">
  <nav class="reading-nav">
    <button class="reading-back" onclick="closeReading()">&larr; Volver</button>
    <span class="reading-entry-id" id="readingEntryId"></span>
  </nav>
  <div class="reading-container">
    <article class="reading-main" id="readingMain"></article>
  </div>
</div>

<!-- ═══════════ REFERENCE POPUP ═══════════ -->
<div class="ref-popup" id="refPopup">
  <div class="ref-popup-header">
    <span class="ref-popup-title" id="refPopupTitle"></span>
    <button class="ref-popup-open" id="refPopupOpen">Abrir al lado</button>
  </div>
  <div class="ref-popup-body" id="refPopupBody"></div>
  <div class="ref-popup-meta" id="refPopupMeta"></div>
</div>

<!-- ═══════════ SIDE PANEL ═══════════ -->
<div class="side-panel" id="sidePanel">
  <div class="side-panel-header">
    <span class="side-panel-title" id="sidePanelTitle"></span>
    <button class="side-panel-close" onclick="closeSidePanel()">Cerrar &times;</button>
  </div>
  <div class="side-panel-body" id="sidePanelBody"></div>
</div>

<!-- ═══════════ FOOTER ═══════════ -->
<footer class="site-footer">
  Mercurio en los engranajes &mdash; J.C. Latenz + Opus 4.6 &mdash; Zettelkasten &mdash; CDMX &mdash; 2026
</footer>

<script src="https://cdn.jsdelivr.net/npm/marked@12/marked.min.js"></script>
<script>
/* ═══════════════════════════════════════════════════════════
   MERCURIO EN LOS ENGRANAJES — Motor Zettelkasten
   ═══════════════════════════════════════════════════════════
   Para agregar una nueva entrada:
     1. Crear entries/Z-XXX.md  (ver Z-001.md como modelo)
     2. Crear illustrations/Z-XXX.svg
     3. Agregar 'Z-XXX' al array ENTRY_IDS aquí abajo
   ─────────────────────────────────────────────────────────
   Nota: requiere servidor HTTP para previsualizar localmente.
   VS Code → Live Server, o: python -m http.server 8000
   ═══════════════════════════════════════════════════════════ */

// Usa el nombre completo del archivo MD (sin extensión).
// El prefijo Z-XXX se extrae automáticamente para encontrar la ilustración.
const ENTRY_IDS = [
  'Z-001_la-estacion-intermedia',
  'Z-002_el-muzak'
];
let ZETTELS = [];

/* ── Frontmatter parser ─────────────────────────────────── */
function parseFrontmatter(text) {
  const m = text.match(/^---\r?\n([\s\S]*?)\r?\n---\r?\n([\s\S]*)$/);
  if (!m) return { fm: {}, body: text };
  const fm = {};
  m[1].split('\n').forEach(line => {
    const kv = line.match(/^(\w+):\s*(.*)/);
    if (!kv) return;
    let val = kv[2].trim().replace(/^["']|["']$/g, '');
    if (val.startsWith('[') && val.endsWith(']'))
      val = val.slice(1, -1).split(',').map(s => s.trim()).filter(Boolean);
    fm[kv[1]] = val;
  });
  return { fm, body: m[2] };
}

/* ── WikiLink parser: [[Z-002|texto]] → <a> cross-ref ───── */
function parseWikilinks(text) {
  return text.replace(/\[\[([A-Z]-\d+)\|([^\]]+)\]\]/g,
    (_, id, label) => `<a class="zettel-link" data-ref="${id}">${label}</a>`);
}

/* ── Default illustration fallback ─────────────────────── */
function defaultIllustration() {
  return `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 200" shape-rendering="crispEdges">
    <rect width="320" height="200" fill="#080808"/>
    <rect x="144" y="84" width="32" height="32" fill="#1a1a18"/>
    <rect x="136" y="92" width="8" height="16" fill="#2a2a28"/>
    <rect x="176" y="92" width="8" height="16" fill="#2a2a28"/>
    <rect x="152" y="76" width="16" height="8" fill="#2a2a28"/>
    <rect x="152" y="116" width="16" height="8" fill="#2a2a28"/>
    <rect x="156" y="92" width="8" height="8" fill="#d4310a"/>
  </svg>`;
}

/* ── Load a single entry from MD + SVG files ────────────── */
async function loadEntry(id) {
  try {
    // Extract Z-XXX prefix for the illustration (e.g. 'Z-002_el-muzak' → 'Z-002')
    const svgId = id.match(/^Z-\d+/)?.[0] || id;

    const [mdRes, svgRes] = await Promise.all([
      fetch(`entries/${id}.md`),
      fetch(`illustrations/${svgId}.svg`)
    ]);
    if (!mdRes.ok) throw new Error(`entries/${id}.md not found`);

    const mdText  = await mdRes.text();
    const svgText = svgRes.ok ? await svgRes.text() : defaultIllustration();
    const { fm, body } = parseFrontmatter(mdText);

    let cleanBody = body.replace(/^#[^\n]+\n+/, ''); // strip H1 (in frontmatter)
    cleanBody = parseWikilinks(cleanBody);            // convert [[id|text]] before marked
    const bodyHtml = marked.parse(cleanBody);

    const links = Array.isArray(fm.links) ? fm.links
                : (fm.links && fm.links !== '[]') ? [fm.links] : [];

    return {
      id:           fm.id || id,
      title:        fm.title || id,
      date:         fm.date || '',
      location:     fm.location || '',
      excerpt:      fm.excerpt || cleanBody.replace(/<[^>]*>/g,'').slice(0, 220) + '…',
      body:         bodyHtml,
      links,
      illustration: svgText
    };
  } catch (err) {
    console.warn(`[Zettelkasten] No se pudo cargar ${id}:`, err);
    return null;
  }
}

/* ── Bind cross-reference links in a container ──────────── */
function bindZettelLinks(container) {
  container.querySelectorAll('.zettel-link').forEach(link => {
    link.addEventListener('click', e => {
      e.preventDefault();
      e.stopPropagation();
      showRefPopup(link.dataset.ref, e, link.textContent);
    });
  });
}

/* ── RENDER GRID ────────────────────────────────────────── */
function renderGrid() {
  const grid = document.getElementById('zettelGrid');
  grid.innerHTML = '';
  ZETTELS.forEach(z => {
    const card = document.createElement('div');
    card.className = 'zettel-card';
    card.onclick = () => openReading(z.id);
    card.innerHTML = `
      <div class="zettel-id">${z.id}</div>
      <div class="zettel-card-title">${z.title}</div>
      <div class="zettel-excerpt">${z.excerpt}</div>
      <div class="zettel-meta">
        <span>${z.date} &mdash; ${z.location}</span>
        ${z.links.length ? `<span class="zettel-links-count">${z.links.length} enlace${z.links.length > 1 ? 's' : ''}</span>` : ''}
      </div>
    `;
    grid.appendChild(card);
  });
}

/* ── OPEN READING VIEW ──────────────────────────────────── */
function openReading(id) {
  const z = ZETTELS.find(e => e.id === id);
  if (!z) return;
  const overlay = document.getElementById('readingOverlay');
  const main    = document.getElementById('readingMain');
  document.getElementById('readingEntryId').textContent = z.id;

  main.innerHTML = `
    <div class="reading-illustration">${z.illustration}</div>
    <div class="reading-meta-block">
      <h1 class="reading-title">${z.title}</h1>
      <div class="reading-info">
        <span>${z.date}</span>
        <span>${z.location}</span>
        <span>J.C. Latenz</span>
      </div>
    </div>
    <div class="reading-body">${z.body}</div>
  `;

  overlay.classList.add('active');
  overlay.scrollTop = 0;
  document.body.style.overflow = 'hidden';
  bindZettelLinks(main);
}

function closeReading() {
  document.getElementById('readingOverlay').classList.remove('active');
  document.body.style.overflow = '';
  closeSidePanel();
  hideRefPopup();
}

/* ── FIND RELEVANT PASSAGE ──────────────────────────────── */
// Searches the entry's body for the passage most related to the link label.
// Falls back to last paragraph if no exact/word match is found.
function findRelevantPassage(bodyHtml, linkLabel) {
  const tmp = document.createElement('div');
  tmp.innerHTML = bodyHtml;
  const text  = tmp.textContent || '';
  const lower = text.toLowerCase();
  const label = (linkLabel || '').toLowerCase().trim();

  let idx = -1, term = '';

  // 1. Try full phrase
  idx = lower.indexOf(label);
  if (idx >= 0) { term = label; }

  // 2. Try each significant word, longest first
  if (idx < 0) {
    const words = label.split(/\s+/)
      .filter(w => w.length > 3)
      .sort((a, b) => b.length - a.length);
    for (const w of words) {
      const i = lower.indexOf(w);
      if (i >= 0) { idx = i; term = w; break; }
    }
  }

  let start, end;

  if (idx >= 0) {
    // Expand to containing sentence
    const before = text.lastIndexOf('. ', idx);
    start = before >= 0 ? before + 2 : Math.max(0, idx - 120);
    const after  = text.indexOf('. ', idx + term.length);
    end   = after  >= 0 ? after + 1  : Math.min(text.length, idx + term.length + 140);
  } else {
    // Fallback: last paragraph (most thematically dense)
    const lastBreak = Math.max(text.lastIndexOf('\n\n'), text.lastIndexOf('. ', text.length - 80));
    start = lastBreak >= 0 ? lastBreak + 2 : Math.max(0, text.length - 320);
    end   = text.length;
  }

  let passage = (start > 2 ? '…' : '') + text.slice(start, end).trim();
  if (end < text.length) passage += '…';

  // Highlight the matched term
  if (term) {
    const re = new RegExp('(' + term.replace(/[.*+?^${}()|[\]\\]/g, '\\$&') + ')', 'gi');
    passage = passage.replace(re, '<span class="ref-highlight">$1</span>');
  }

  return passage || text.slice(0, 260) + '…';
}

/* ── REFERENCE POPUP ────────────────────────────────────── */
let currentRefId = null;

function showRefPopup(refId, event, linkLabel) {
  const z = ZETTELS.find(e => e.id === refId);
  if (!z) return;
  currentRefId = refId;

  const passage = findRelevantPassage(z.body, linkLabel);

  document.getElementById('refPopupTitle').textContent = z.title;
  document.getElementById('refPopupBody').innerHTML    = passage;
  document.getElementById('refPopupMeta').textContent  = `${z.id} — ${z.date} — ${z.location}`;

  const popup = document.getElementById('refPopup');
  const rect  = event.target.getBoundingClientRect();
  let top  = rect.bottom + 8;
  let left = rect.left;
  if (left + 400 > window.innerWidth) left = window.innerWidth - 420;
  if (left < 10) left = 10;
  if (top + 280 > window.innerHeight) top = rect.top - 290;

  popup.style.top  = top  + 'px';
  popup.style.left = left + 'px';
  popup.classList.add('active');

  document.getElementById('refPopupOpen').onclick = () => {
    hideRefPopup();
    openSidePanel(refId);
  };
}

function hideRefPopup() {
  document.getElementById('refPopup').classList.remove('active');
  currentRefId = null;
}

document.addEventListener('click', e => {
  const popup = document.getElementById('refPopup');
  if (popup.classList.contains('active')
      && !popup.contains(e.target)
      && !e.target.classList.contains('zettel-link')) {
    hideRefPopup();
  }
});

/* ── SIDE PANEL ─────────────────────────────────────────── */
function openSidePanel(id) {
  const z = ZETTELS.find(e => e.id === id);
  if (!z) return;
  document.getElementById('sidePanelTitle').textContent = `${z.id} — ${z.title}`;
  const body = document.getElementById('sidePanelBody');
  body.innerHTML = z.body;
  document.getElementById('sidePanel').classList.add('active');
  bindZettelLinks(body);
}

function closeSidePanel() {
  document.getElementById('sidePanel').classList.remove('active');
}

/* ── HEADER DATE ────────────────────────────────────────── */
function setHeaderDate() {
  const meses = ['enero','febrero','marzo','abril','mayo','junio',
                 'julio','agosto','septiembre','octubre','noviembre','diciembre'];
  const d = new Date();
  document.getElementById('headerDate').textContent =
    `${d.getDate()} de ${meses[d.getMonth()]} de ${d.getFullYear()}`;
}

/* ── KEYBOARD SHORTCUTS ─────────────────────────────────── */
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') {
    if (document.getElementById('sidePanel').classList.contains('active')) {
      closeSidePanel();
    } else if (document.getElementById('readingOverlay').classList.contains('active')) {
      closeReading();
    }
    hideRefPopup();
  }
});

/* ── INIT — async entry loading ─────────────────────────── */
async function init() {
  setHeaderDate();

  const grid = document.getElementById('zettelGrid');
  grid.innerHTML = `<div style="color:var(--fg-muted);font-family:var(--font-mono);
    font-size:0.68rem;letter-spacing:0.14em;padding:2rem 0;
    grid-column:1/-1;text-transform:uppercase;">Cargando fragmentos…</div>`;

  const results = await Promise.all(ENTRY_IDS.map(loadEntry));
  ZETTELS = results.filter(Boolean);
  renderGrid();
}

init();
</script>
