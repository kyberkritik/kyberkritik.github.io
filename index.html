<!DOCTYPE html>
<html lang="es" data-theme="ballard">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mercurio en los engranajes — J.C. Latenz</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Source+Serif+4:ital,opsz,wght@0,8..60,300;0,8..60,400;0,8..60,600;1,8..60,300;1,8..60,400&family=JetBrains+Mono:wght@300;400&family=Inter:wght@300;400;500;600&display=swap');

  /* ═══════════════════════════════════════
     RESET & ROOT
     ═══════════════════════════════════════ */
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --bg: #151114;
    --bg-card: #1f181c;
    --bg-card-hover: #2a2025;
    --fg: #f0e6d8;
    --fg-dim: #ccb9aa;
    --fg-muted: #8f7d76;
    --accent: #b85185;
    --accent-warm: #d2614e;
    --accent-gold: #a39058;
    --accent-cold: #66724f;
    --accent-violet: #5a3275;
    --chrome-bright: #f4ead9;
    --chrome-mid: #cab19b;
    --chrome-dark: #5a4345;
    --border: #45373c;
    --border-light: #5f4c51;
    --font-body: 'Source Serif 4', 'Georgia', serif;
    --font-sans: 'Inter', -apple-system, sans-serif;
    --font-mono: 'JetBrains Mono', monospace;
    --line-height: 1.72;
    --letter-spacing: 0.01em;
    --max-read: 38rem;
    --ambient-a: rgba(184, 81, 133, 0.12);
    --ambient-b: rgba(103, 114, 79, 0.14);
    --ambient-c: rgba(244, 234, 217, 0.03);
    --selection-fg: #fff;
    --header-border: rgba(240, 230, 216, 0.12);
    --header-start: rgba(29, 21, 25, 0.96);
    --header-end: rgba(18, 13, 16, 0.94);
    --header-inner-line: rgba(244, 234, 217, 0.05);
    --header-glow-a: rgba(184, 81, 133, 0.13);
    --header-glow-b: rgba(103, 114, 79, 0.14);
    --header-glow-c: rgba(244, 234, 217, 0.06);
    --ornament-frame: rgba(202, 177, 155, 0.22);
    --ornament-start: rgba(31, 23, 28, 0.94);
    --ornament-end: rgba(18, 13, 16, 0.98);
    --ornament-inner-line: rgba(244, 234, 217, 0.06);
    --ornament-grid: rgba(244, 234, 217, 0.04);
    --ornament-bloom-a: rgba(184, 81, 133, 0.15);
    --ornament-bloom-b: rgba(163, 144, 88, 0.18);
    --ornament-filter: none;
    --card-start: rgba(31, 24, 28, 0.98);
    --card-end: rgba(23, 18, 21, 0.98);
    --card-overlay-a: rgba(184, 81, 133, 0.1);
    --card-overlay-b: rgba(163, 144, 88, 0.1);
    --reading-nav-bg: rgba(21, 17, 20, 0.9);
    --reader-page-bg: rgba(26, 19, 23, 0.84);
    --reader-page-border: rgba(202, 177, 155, 0.12);
    --reader-page-shadow: 0 18px 48px rgba(0, 0, 0, 0.24);
    --surface-illustration: #120d10;
    --popup-bg: #1a1418;
    --popup-shadow: rgba(0, 0, 0, 0.6);
    --side-bg: #171115;
    --footer-bg: rgba(23, 18, 21, 0.72);
    --diagram-modal-bg: rgba(0, 0, 0, 0.92);
    --reader-rail-bg: rgba(19, 15, 18, 0.72);
    --reader-rail-border: rgba(202, 177, 155, 0.16);
    --reader-rail-shadow: 0 10px 26px rgba(0, 0, 0, 0.22);
  }

  html[data-theme="ballard"] {
    color-scheme: dark;
  }

  html[data-theme="paper"] {
    color-scheme: light;
    --bg: #f8f4ed;
    --bg-card: #fffdfa;
    --bg-card-hover: #f3eee7;
    --fg: #101010;
    --fg-dim: #4f4a44;
    --fg-muted: #7a736b;
    --accent: #161616;
    --accent-warm: #5f5950;
    --accent-gold: #8a7a68;
    --accent-cold: #7f8573;
    --accent-violet: #6b6470;
    --chrome-bright: #fffdf7;
    --chrome-mid: #d3c7b9;
    --chrome-dark: #8f8376;
    --border: #d8cdc1;
    --border-light: #c5b9ac;
    --ambient-a: rgba(20, 18, 17, 0.035);
    --ambient-b: rgba(138, 122, 104, 0.07);
    --ambient-c: rgba(255, 255, 255, 0.58);
    --selection-fg: #fff;
    --header-border: rgba(16, 16, 16, 0.12);
    --header-start: rgba(249, 246, 239, 0.96);
    --header-end: rgba(241, 236, 226, 0.94);
    --header-inner-line: rgba(16, 16, 16, 0.06);
    --header-glow-a: rgba(16, 16, 16, 0.03);
    --header-glow-b: rgba(138, 122, 104, 0.05);
    --header-glow-c: rgba(255, 255, 255, 0.44);
    --ornament-frame: rgba(16, 16, 16, 0.12);
    --ornament-start: rgba(255, 252, 246, 0.96);
    --ornament-end: rgba(238, 232, 222, 0.96);
    --ornament-inner-line: rgba(16, 16, 16, 0.04);
    --ornament-grid: rgba(16, 16, 16, 0.05);
    --ornament-bloom-a: rgba(16, 16, 16, 0.05);
    --ornament-bloom-b: rgba(138, 122, 104, 0.08);
    --ornament-filter: saturate(0.58) brightness(1.1) contrast(0.92);
    --card-start: rgba(255, 253, 249, 0.98);
    --card-end: rgba(245, 240, 233, 0.98);
    --card-overlay-a: rgba(16, 16, 16, 0.05);
    --card-overlay-b: rgba(138, 122, 104, 0.06);
    --reading-nav-bg: rgba(248, 244, 237, 0.94);
    --reader-page-bg: rgba(255, 253, 249, 0.92);
    --reader-page-border: rgba(16, 16, 16, 0.09);
    --reader-page-shadow: 0 16px 38px rgba(84, 72, 58, 0.12);
    --surface-illustration: #f2ece3;
    --popup-bg: #fffaf3;
    --popup-shadow: rgba(59, 51, 43, 0.12);
    --side-bg: #f7f2eb;
    --footer-bg: rgba(246, 241, 233, 0.76);
    --diagram-modal-bg: rgba(242, 237, 228, 0.97);
    --reader-rail-bg: rgba(255, 251, 243, 0.82);
    --reader-rail-border: rgba(16, 16, 16, 0.1);
    --reader-rail-shadow: 0 10px 24px rgba(84, 72, 58, 0.12);
  }

  html[data-theme="night"] {
    color-scheme: dark;
    --bg: #040608;
    --bg-card: #0a0e12;
    --bg-card-hover: #11161d;
    --fg: #eef7ff;
    --fg-dim: #a8b7cb;
    --fg-muted: #667286;
    --accent: #39efff;
    --accent-warm: #ff5aa2;
    --accent-gold: #ffd76b;
    --accent-cold: #46ffb5;
    --accent-violet: #7b6fff;
    --chrome-bright: #f2fbff;
    --chrome-mid: #9bcce6;
    --chrome-dark: #304056;
    --border: #1f2b38;
    --border-light: #314456;
    --ambient-a: rgba(57, 239, 255, 0.12);
    --ambient-b: rgba(123, 111, 255, 0.12);
    --ambient-c: rgba(255, 90, 162, 0.05);
    --selection-fg: #050608;
    --header-border: rgba(238, 247, 255, 0.1);
    --header-start: rgba(5, 8, 12, 0.96);
    --header-end: rgba(3, 4, 8, 0.95);
    --header-inner-line: rgba(57, 239, 255, 0.08);
    --header-glow-a: rgba(57, 239, 255, 0.12);
    --header-glow-b: rgba(123, 111, 255, 0.12);
    --header-glow-c: rgba(255, 90, 162, 0.06);
    --ornament-frame: rgba(57, 239, 255, 0.16);
    --ornament-start: rgba(8, 11, 16, 0.94);
    --ornament-end: rgba(2, 4, 8, 0.98);
    --ornament-inner-line: rgba(57, 239, 255, 0.08);
    --ornament-grid: rgba(238, 247, 255, 0.05);
    --ornament-bloom-a: rgba(57, 239, 255, 0.18);
    --ornament-bloom-b: rgba(255, 90, 162, 0.16);
    --ornament-filter: saturate(1.18) contrast(1.05) brightness(0.92) hue-rotate(8deg);
    --card-start: rgba(10, 14, 18, 0.98);
    --card-end: rgba(6, 10, 14, 0.98);
    --card-overlay-a: rgba(57, 239, 255, 0.08);
    --card-overlay-b: rgba(255, 90, 162, 0.08);
    --reading-nav-bg: rgba(4, 6, 8, 0.94);
    --reader-page-bg: rgba(8, 11, 16, 0.88);
    --reader-page-border: rgba(57, 239, 255, 0.1);
    --reader-page-shadow: 0 18px 42px rgba(0, 0, 0, 0.38);
    --surface-illustration: #020406;
    --popup-bg: #090d13;
    --popup-shadow: rgba(0, 0, 0, 0.72);
    --side-bg: #070b10;
    --footer-bg: rgba(4, 6, 8, 0.78);
    --diagram-modal-bg: rgba(0, 0, 0, 0.96);
    --reader-rail-bg: rgba(7, 10, 15, 0.82);
    --reader-rail-border: rgba(57, 239, 255, 0.14);
    --reader-rail-shadow: 0 12px 28px rgba(0, 0, 0, 0.34);
  }

  html {
    font-size: 17px;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
  }

  @media (min-width: 1400px) { html { font-size: 18px; } }
  @media (min-width: 1800px) { html { font-size: 20px; } }
  @media (min-width: 2400px) { html { font-size: 22px; } }

  body {
    background:
      radial-gradient(circle at 12% 0%, var(--ambient-a), transparent 24%),
      radial-gradient(circle at 85% 4%, var(--ambient-b), transparent 28%),
      linear-gradient(180deg, var(--ambient-c), transparent 18%),
      var(--bg);
    color: var(--fg);
    font-family: var(--font-body);
    line-height: var(--line-height);
    letter-spacing: var(--letter-spacing);
    min-height: 100vh;
    overflow-x: hidden;
    transition: background 0.32s ease, color 0.32s ease;
  }

  ::selection {
    background: var(--accent);
    color: var(--selection-fg);
  }

  /* ═══════════════════════════════════════
     HEADER — Weimar broadsheet style
     ═══════════════════════════════════════ */
  .site-header {
    border-bottom: 1px solid var(--header-border);
    padding: 2.4rem 2rem 1.6rem;
    position: relative;
    overflow: hidden;
    background:
      linear-gradient(180deg, var(--header-start), var(--header-end)),
      var(--bg);
    box-shadow: inset 0 -1px 0 var(--header-inner-line);
  }

  .site-header::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 4px;
    background: linear-gradient(90deg, var(--accent), var(--accent-cold), var(--accent-violet));
  }

  .site-header::after {
    content: '';
    position: absolute;
    inset: 0;
    background:
      radial-gradient(circle at 14% 24%, var(--header-glow-a), transparent 24%),
      radial-gradient(circle at 82% 28%, var(--header-glow-b), transparent 28%),
      linear-gradient(115deg, var(--header-glow-c), transparent 38%);
    pointer-events: none;
  }

  .site-header,
  .header-ornament,
  .header-ornament-svg,
  .zettel-card,
  .reading-overlay,
  .reading-nav,
  .reading-main,
  .reading-illustration,
  .ref-popup,
  .side-panel,
  .side-panel-header,
  .site-footer,
  .diagram-modal,
  .reader-rail,
  .theme-pixel {
    transition:
      background 0.32s ease,
      background-color 0.32s ease,
      border-color 0.32s ease,
      color 0.32s ease,
      box-shadow 0.32s ease,
      filter 0.32s ease;
  }

  .header-shell {
    max-width: 1800px;
    margin: 0 auto;
    display: grid;
    grid-template-columns: minmax(0, 1.05fr) minmax(320px, 0.95fr);
    gap: 2rem;
    align-items: end;
    position: relative;
    z-index: 1;
  }

  .header-copy {
    max-width: 54rem;
    position: relative;
    z-index: 1;
  }

  .header-date {
    font-family: var(--font-mono);
    font-size: 0.7rem;
    font-weight: 300;
    color: var(--fg-dim);
    letter-spacing: 0.18em;
    text-transform: uppercase;
    margin-bottom: 0.6rem;
  }

  .header-title {
    font-family: var(--font-sans);
    font-size: clamp(1.6rem, 4vw, 2.8rem);
    font-weight: 600;
    line-height: 1.15;
    color: var(--fg);
    letter-spacing: -0.02em;
    max-width: 52rem;
  }

  .header-title span.mercury {
    background: linear-gradient(112deg,
      var(--chrome-bright) 4%,
      var(--chrome-mid) 28%,
      var(--accent) 52%,
      var(--accent-warm) 76%,
      var(--accent-cold) 100%);
    -webkit-background-clip: text;
    background-clip: text;
    -webkit-text-fill-color: transparent;
    color: transparent;
  }

  .header-subtitle {
    font-family: var(--font-sans);
    font-size: 0.82rem;
    font-weight: 300;
    color: var(--fg-dim);
    margin-top: 0.7rem;
    letter-spacing: 0.06em;
    text-transform: uppercase;
  }

  .header-author {
    font-family: var(--font-mono);
    font-size: 0.72rem;
    color: var(--fg-muted);
    letter-spacing: 0.15em;
    text-transform: uppercase;
    margin-top: 1.2rem;
    padding-top: 0.8rem;
    border-top: 1px solid var(--border);
    display: inline-block;
  }

  .header-author strong {
    color: var(--fg-dim);
    font-weight: 400;
  }

  .header-ornament {
    --parallax-x: 0;
    --parallax-y: 0;
    min-height: 250px;
    position: relative;
    border: 1px solid var(--ornament-frame);
    border-radius: 1rem;
    overflow: hidden;
    background: linear-gradient(160deg, var(--ornament-start), var(--ornament-end));
    box-shadow:
      inset 0 1px 0 var(--ornament-inner-line),
      0 20px 48px rgba(0,0,0,0.34);
  }

  .header-ornament::before {
    content: '';
    position: absolute;
    inset: 0;
    background:
      linear-gradient(var(--ornament-grid) 1px, transparent 1px),
      linear-gradient(90deg, var(--ornament-grid) 1px, transparent 1px);
    background-size: 26px 26px;
    opacity: 0.12;
    -webkit-mask-image: linear-gradient(180deg, rgba(0,0,0,0.8), transparent 90%);
    mask-image: linear-gradient(180deg, rgba(0,0,0,0.8), transparent 90%);
    pointer-events: none;
  }

  .header-ornament::after {
    content: '';
    position: absolute;
    left: -8%;
    right: -8%;
    bottom: 8%;
    height: 38%;
    background: linear-gradient(90deg,
      transparent,
      var(--ornament-bloom-a),
      var(--ornament-bloom-b),
      transparent);
    filter: blur(30px);
    animation: panelSweep 10s ease-in-out infinite alternate;
    pointer-events: none;
  }

  .header-ornament-svg {
    display: block;
    width: 100%;
    height: 100%;
    min-height: 250px;
    position: relative;
    z-index: 1;
    filter: var(--ornament-filter);
  }

  .pinball-layer {
    transform: translate(calc(var(--parallax-x) * -14px), calc(var(--parallax-y) * -9px));
    transition: transform 0.45s ease;
  }

  .mechanism-layer {
    transform: translate(calc(var(--parallax-x) * 12px), calc(var(--parallax-y) * 8px));
    transition: transform 0.45s ease;
  }

  .hud-layer {
    transform: translate(calc(var(--parallax-x) * 7px), calc(var(--parallax-y) * 5px));
    transition: transform 0.45s ease;
  }

  .playfield-shadow {
    fill: rgba(0, 0, 0, 0.38);
    filter: blur(18px);
  }

  .cabinet-frame {
    fill: rgba(33, 24, 28, 0.96);
    stroke: rgba(244, 234, 217, 0.14);
    stroke-width: 2;
  }

  .cabinet-liner {
    fill: rgba(19, 14, 17, 0.92);
    stroke: rgba(202, 177, 155, 0.18);
    stroke-width: 1.5;
  }

  .playfield-body {
    fill: #151412;
    stroke: rgba(244, 234, 217, 0.18);
    stroke-width: 1.4;
  }

  .playfield-gloss {
    fill: url(#glassShine);
    opacity: 0.22;
  }

  .playfield-panel {
    opacity: 0.76;
  }

  .panel-magenta {
    fill: rgba(184, 81, 133, 0.18);
  }

  .panel-olive {
    fill: rgba(103, 114, 79, 0.22);
  }

  .panel-cream {
    fill: rgba(244, 234, 217, 0.08);
  }

  .playfield-title {
    fill: rgba(244, 234, 217, 0.86);
    font-family: var(--font-sans);
    font-size: 20px;
    font-weight: 600;
    letter-spacing: 0.18em;
    text-transform: uppercase;
  }

  .playfield-caption {
    fill: rgba(240, 230, 216, 0.68);
    font-family: var(--font-mono);
    font-size: 9px;
    letter-spacing: 0.22em;
    text-transform: uppercase;
  }

  .playfield-mark {
    fill: rgba(232, 215, 191, 0.52);
    font-family: var(--font-mono);
    font-size: 10px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
  }

  .launch-lane,
  .gear-window,
  .status-panel {
    fill: rgba(17, 13, 15, 0.8);
    stroke: rgba(244, 234, 217, 0.14);
    stroke-width: 1.2;
  }

  .gear-window-glow {
    fill: rgba(184, 81, 133, 0.05);
  }

  .mercury-route {
    fill: none;
    stroke: url(#railChrome);
    stroke-width: 2.4;
    stroke-linecap: round;
    stroke-linejoin: round;
    opacity: 0.46;
  }

  .lane-rail,
  .lane-guide,
  .orbit-guide,
  .accumulator-tube,
  .status-arc {
    fill: none;
    stroke: url(#railChrome);
    stroke-width: 3.2;
    stroke-linecap: round;
    stroke-linejoin: round;
    opacity: 0.92;
  }

  .lane-guide {
    stroke-width: 1.6;
    opacity: 0.28;
  }

  .orbit-guide {
    stroke-width: 1.5;
    opacity: 0.24;
  }

  .status-arc {
    stroke-width: 2.2;
    opacity: 0.58;
  }

  .status-tick {
    stroke: rgba(244, 234, 217, 0.38);
    stroke-width: 1.3;
    stroke-linecap: round;
  }

  .target-bank rect {
    fill: url(#railChrome);
    stroke: rgba(31, 24, 28, 0.46);
    stroke-width: 1;
  }

  .target-mark {
    fill: rgba(90, 50, 117, 0.32);
  }

  .bumper-wrap {
    transform-box: fill-box;
    transform-origin: center;
  }

  .bumper-ring {
    fill: rgba(184, 81, 133, 0.04);
    stroke: rgba(244, 234, 217, 0.18);
    stroke-width: 4;
    filter: drop-shadow(0 0 8px rgba(184, 81, 133, 0.1));
  }

  .bumper-shell {
    fill: #242420;
    stroke: rgba(244, 234, 217, 0.2);
    stroke-width: 1.4;
  }

  .sling-shot {
    fill: rgba(90, 50, 117, 0.18);
    stroke: rgba(244, 234, 217, 0.14);
    stroke-width: 1.1;
  }

  .lamp {
    opacity: 0.18;
  }

  .lamp-glow {
    fill: rgba(184, 81, 133, 0.76);
    filter: blur(7px);
  }

  .lamp-core {
    fill: rgba(255, 248, 240, 0.94);
  }

  .lamp-olive .lamp-glow {
    fill: rgba(163, 144, 88, 0.68);
  }

  .lamp-olive .lamp-core {
    fill: rgba(242, 236, 216, 0.94);
  }

  .lamp-cream .lamp-glow {
    fill: rgba(244, 234, 217, 0.58);
  }

  .flipper-body {
    fill: #2b2a27;
    stroke: rgba(244, 234, 217, 0.22);
    stroke-width: 1.5;
  }

  .flipper-cap {
    fill: rgba(19, 14, 17, 0.96);
    stroke: rgba(202, 177, 155, 0.32);
    stroke-width: 1.4;
  }

  .plunger-track {
    fill: rgba(14, 11, 13, 0.54);
    stroke: rgba(244, 234, 217, 0.12);
    stroke-width: 1.2;
  }

  .plunger-spring {
    fill: none;
    stroke: rgba(244, 234, 217, 0.6);
    stroke-width: 1.8;
    stroke-linecap: round;
    stroke-dasharray: 4 4;
  }

  .plunger-knob {
    fill: #2f2d29;
    stroke: rgba(244, 234, 217, 0.22);
    stroke-width: 1.2;
  }

  #pinballMotionPath {
    fill: none;
    stroke: none;
  }

  .pinball-ball-aura {
    fill: url(#ballAura);
    opacity: 0.52;
  }

  .pinball-ball {
    fill: url(#mercuryChrome);
    stroke: rgba(244, 234, 217, 0.24);
    stroke-width: 1.3;
    filter: drop-shadow(0 0 14px rgba(184, 81, 133, 0.2));
  }

  .pinball-ball-shine {
    fill: rgba(255, 255, 255, 0.84);
  }

  .accumulator-frame {
    fill: rgba(19, 14, 17, 0.92);
    stroke: rgba(244, 234, 217, 0.18);
    stroke-width: 1.4;
  }

  .accumulator-glass {
    fill: rgba(244, 234, 217, 0.05);
    stroke: rgba(244, 234, 217, 0.12);
    stroke-width: 1;
  }

  .accumulator-fill {
    fill: url(#accumulatorMercury);
  }

  .accumulator-surface {
    fill: rgba(244, 234, 217, 0.9);
    opacity: 0.86;
  }

  .accumulator-scale {
    fill: none;
    stroke: rgba(202, 177, 155, 0.34);
    stroke-width: 1.4;
    stroke-linecap: round;
  }

  .accumulator-label,
  .status-label,
  .status-subtext,
  .status-readout {
    fill: rgba(240, 230, 216, 0.84);
    font-family: var(--font-mono);
    text-transform: uppercase;
  }

  .accumulator-label,
  .status-label {
    font-size: 10px;
    letter-spacing: 0.16em;
  }

  .status-subtext {
    fill: rgba(176, 156, 149, 0.82);
    font-size: 8px;
    letter-spacing: 0.12em;
  }

  .status-readout {
    font-size: 18px;
    letter-spacing: 0.12em;
  }

  .status-needle {
    stroke: rgba(244, 234, 217, 0.94);
    stroke-width: 2.2;
    stroke-linecap: round;
    filter: drop-shadow(0 0 4px rgba(244, 234, 217, 0.18));
  }

  .status-needle-core {
    fill: rgba(244, 234, 217, 0.84);
  }

  .pinball-gear {
    transform-box: fill-box;
    transform-origin: center;
  }

  .gear-body {
    fill: url(#gearChrome);
    stroke: rgba(244, 234, 217, 0.22);
    stroke-width: 2;
    stroke-linejoin: bevel;
  }

  .gear-rim {
    fill: none;
    stroke: rgba(25, 18, 20, 0.68);
    stroke-width: 10;
    stroke-linejoin: bevel;
  }

  .gear-reflect {
    fill: rgba(244, 234, 217, 0.16);
  }

  .gear-core {
    fill: #1a1418;
    stroke: rgba(202, 177, 155, 0.4);
    stroke-width: 2;
  }

  .gear-core-shine {
    fill: rgba(244, 234, 217, 0.18);
  }

  .ornament-star {
    fill: rgba(244, 234, 217, 0.52);
  }

  .pixel-sky {
    fill: #080808;
  }

  .pixel-band {
    fill: #0d0d0c;
  }

  .pixel-brick {
    fill: #111110;
  }

  .pixel-column-dark {
    fill: #141412;
  }

  .pixel-column-light {
    fill: #111110;
  }

  .machine-frame {
    fill: #1c1c1a;
  }

  .machine-rim {
    fill: #2a2a28;
  }

  .machine-shadow {
    fill: #0a0a09;
  }

  .machine-window {
    fill: #0d0d0b;
  }

  .machine-slot {
    fill: #171715;
  }

  .machine-line {
    fill: #1f1f1d;
  }

  .machine-signal {
    fill: #1a4a6a;
  }

  .machine-signal-alt {
    fill: #2a6f97;
  }

  .machine-signal-deep {
    fill: #163040;
  }

  .machine-amber {
    fill: #c9a84c;
  }

  .machine-amber-soft {
    fill: #e8c97a;
  }

  .machine-red {
    fill: #d2614e;
  }

  .machine-red-soft {
    fill: #f0a092;
  }

  .machine-label {
    fill: rgba(240, 230, 216, 0.42);
    font-family: var(--font-mono);
    font-size: 9px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
  }

  .mast-body {
    fill: #3a3a38;
  }

  .mast-rung {
    fill: #2a2a28;
  }

  .feedback-dot {
    fill: #1c1c1a;
  }

  .calligram-trace {
    fill: none;
    stroke: rgba(244, 234, 217, 0.12);
    stroke-width: 2;
    stroke-linecap: square;
    stroke-dasharray: 6 6;
    opacity: 0.78;
  }

  .signal-ring {
    animation: signalPulse 2.2s step-end infinite;
  }

  .signal-ring-b {
    animation-delay: 0.55s;
  }

  .signal-ring-c {
    animation-delay: 1.1s;
  }

  .antenna-tip {
    animation: antennaBlink 2.4s step-end infinite;
  }

  @keyframes signalPulse {
    0% { opacity: 0.12; }
    14% { opacity: 1; }
    48% { opacity: 0.4; }
    100% { opacity: 0.1; }
  }

  @keyframes antennaBlink {
    0%, 42% { opacity: 1; }
    45%, 52% { opacity: 0; }
    55%, 100% { opacity: 1; }
  }

  @keyframes panelSweep {
    from { transform: translateX(-4%); }
    to { transform: translateX(6%); }
  }

  @media (max-width: 920px) {
    .header-shell {
      grid-template-columns: 1fr;
      gap: 1.4rem;
    }

    .header-ornament {
      min-height: 220px;
    }

    .header-ornament-svg {
      min-height: 220px;
    }
  }

  @media (max-width: 640px) {
    .site-header {
      padding: 2rem 1rem 1.2rem;
    }

    .header-ornament {
      min-height: 190px;
      border-radius: 0.85rem;
    }

    .header-ornament-svg {
      min-height: 190px;
    }

    .reading-nav {
      padding: 0.8rem 1rem;
    }

    .reading-container {
      padding: 1.25rem 0.9rem 5rem;
    }

    .reading-main {
      padding: 1.05rem;
      border-radius: 0.95rem;
    }

    .reader-rail {
      top: auto;
      bottom: 0.9rem;
      right: 0.9rem;
      left: auto;
      transform: none;
      flex-direction: row;
      align-items: center;
      padding: 0.35rem 0.45rem;
      border-radius: 0.9rem;
      width: auto;
      height: auto;
      max-height: none;
    }
  }

  @media (orientation: portrait) and (max-width: 1100px) {
    .reader-rail {
      top: auto;
      right: 0.9rem;
      bottom: 0.9rem;
      left: auto;
      transform: none;
      flex-direction: row;
      align-items: center;
      justify-content: center;
      gap: 0.35rem;
      padding: 0.4rem 0.5rem;
      border-radius: 0.95rem;
      width: auto;
      height: auto;
      max-height: none;
    }

    .theme-pixel {
      flex: 0 0 auto;
    }
  }

  @media (prefers-reduced-motion: reduce) {
    .header-ornament::after {
      animation: none;
    }

    .signal-ring,
    .antenna-tip {
      animation: none;
    }

    .pinball-layer,
    .mechanism-layer,
    .hud-layer {
      transition: none;
      transform: none;
    }
  }

  /* ═══════════════════════════════════════
     ZETTELKASTEN GRID
     ═══════════════════════════════════════ */
  .zettel-grid {
    padding: 2rem;
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    gap: 1.2rem;
    max-width: 1800px;
    margin: 0 auto;
  }

  @media (min-width: 2000px) {
    .zettel-grid {
      grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
      gap: 1.4rem;
    }
  }

  @media (max-width: 600px) {
    .zettel-grid {
      grid-template-columns: 1fr;
      padding: 1rem;
      gap: 1rem;
    }
  }

  /* ═══════════════════════════════════════
     ZETTEL CARD
     ═══════════════════════════════════════ */
  .zettel-card {
    background: linear-gradient(180deg, var(--card-start), var(--card-end));
    border: 1px solid var(--border);
    padding: 1.4rem 1.5rem;
    cursor: pointer;
    transition: all 0.2s ease;
    position: relative;
    display: flex;
    flex-direction: column;
  }

  .zettel-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0;
    width: 3px;
    height: 100%;
    background: var(--accent);
    opacity: 0;
    transition: opacity 0.2s ease;
  }

  .zettel-card::after {
    content: '';
    position: absolute;
    inset: 0;
    background:
      linear-gradient(135deg, var(--card-overlay-a), transparent 45%),
      linear-gradient(320deg, var(--card-overlay-b), transparent 40%);
    opacity: 0;
    transition: opacity 0.2s ease;
    pointer-events: none;
  }

  .zettel-card:hover {
    background: var(--bg-card-hover);
    border-color: var(--border-light);
    transform: translateY(-1px);
  }

  .zettel-card:hover::before {
    opacity: 1;
  }

  .zettel-card:hover::after {
    opacity: 1;
  }

  .zettel-id {
    font-family: var(--font-mono);
    font-size: 0.65rem;
    color: var(--accent);
    letter-spacing: 0.12em;
    margin-bottom: 0.6rem;
  }

  .zettel-card-title {
    font-family: var(--font-sans);
    font-size: 1rem;
    font-weight: 500;
    color: var(--fg);
    line-height: 1.35;
    margin-bottom: 0.6rem;
  }

  .zettel-excerpt {
    font-family: var(--font-body);
    font-size: 0.88rem;
    color: var(--fg-dim);
    line-height: 1.55;
    flex: 1;
    display: -webkit-box;
    -webkit-line-clamp: 4;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }

  .zettel-meta {
    font-family: var(--font-mono);
    font-size: 0.62rem;
    color: var(--fg-muted);
    letter-spacing: 0.1em;
    margin-top: 0.9rem;
    padding-top: 0.7rem;
    border-top: 1px solid var(--border);
    display: flex;
    justify-content: space-between;
    text-transform: uppercase;
  }

  .zettel-links-count {
    color: var(--accent-gold);
  }

  /* ═══════════════════════════════════════
     READING VIEW
     ═══════════════════════════════════════ */
  .reading-overlay {
    position: fixed;
    inset: 0;
    background:
      radial-gradient(circle at 12% 0%, var(--ambient-a), transparent 26%),
      radial-gradient(circle at 88% 8%, var(--ambient-b), transparent 30%),
      linear-gradient(180deg, var(--ambient-c), transparent 22%),
      var(--bg);
    z-index: 100;
    overflow-y: auto;
    opacity: 0;
    visibility: hidden;
    transition: opacity 0.3s ease, visibility 0.3s ease;
  }

  .reading-overlay.active {
    opacity: 1;
    visibility: visible;
  }

  .reading-nav {
    position: sticky;
    top: 0;
    background: var(--reading-nav-bg);
    border-bottom: 1px solid var(--border);
    padding: 0.9rem 2rem;
    display: flex;
    align-items: center;
    justify-content: space-between;
    z-index: 110;
    backdrop-filter: blur(8px);
  }

  .reading-back {
    font-family: var(--font-mono);
    font-size: 0.72rem;
    color: var(--fg-dim);
    letter-spacing: 0.1em;
    text-transform: uppercase;
    background: none;
    border: 1px solid var(--border);
    padding: 0.4rem 1rem;
    cursor: pointer;
    transition: all 0.15s ease;
  }

  .reading-back:hover {
    color: var(--fg);
    border-color: var(--fg-dim);
  }

  .reading-entry-id {
    font-family: var(--font-mono);
    font-size: 0.65rem;
    color: var(--fg-muted);
    letter-spacing: 0.12em;
  }

  .reading-container {
    display: flex;
    justify-content: center;
    padding: 3rem 2rem 6rem;
    gap: 2rem;
  }

  .reading-main {
    max-width: var(--max-read);
    width: 100%;
    position: relative;
    padding: clamp(1.45rem, 1.1rem + 1vw, 2.25rem);
    background: var(--reader-page-bg);
    border: 1px solid var(--reader-page-border);
    border-radius: 1.1rem;
    box-shadow: var(--reader-page-shadow), inset 0 1px 0 var(--header-inner-line);
    backdrop-filter: blur(7px);
  }

  .reading-illustration {
    margin-bottom: 2.4rem;
    border: 1px solid var(--border);
    background: var(--surface-illustration);
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 1.5rem;
    max-height: 320px;
    overflow: hidden;
  }

  .reading-illustration svg {
    width: 100%;
    max-height: 280px;
    height: auto;
  }

  .reading-meta-block {
    margin-bottom: 2rem;
    padding-bottom: 1.2rem;
    border-bottom: 1px solid var(--border);
  }

  .reading-title {
    font-family: var(--font-sans);
    font-size: clamp(1.5rem, 3.5vw, 2.2rem);
    font-weight: 600;
    line-height: 1.2;
    letter-spacing: -0.02em;
    margin-bottom: 0.7rem;
  }

  .reading-info {
    font-family: var(--font-mono);
    font-size: 0.68rem;
    color: var(--fg-muted);
    letter-spacing: 0.1em;
    text-transform: uppercase;
    display: flex;
    gap: 1.5rem;
    flex-wrap: wrap;
  }

  .reading-body {
    font-family: var(--font-body);
    font-size: 1.05rem;
    line-height: var(--line-height);
    color: var(--fg);
  }

  .reading-body p {
    margin-bottom: 1.3rem;
  }

  .reading-body p:last-child {
    margin-bottom: 0;
  }

  /* Cross-reference links inside text */
  .zettel-link {
    color: var(--accent-gold);
    text-decoration: none;
    border-bottom: 1px dotted var(--accent-gold);
    cursor: pointer;
    transition: color 0.15s;
    position: relative;
  }

  .zettel-link:hover {
    color: var(--accent-warm);
    border-bottom-color: var(--accent-warm);
  }

  /* ═══════════════════════════════════════
     REFERENCE POPUP
     ═══════════════════════════════════════ */
  .ref-popup {
    position: fixed;
    z-index: 200;
    background: var(--popup-bg);
    border: 1px solid var(--border-light);
    box-shadow: 0 12px 40px var(--popup-shadow);
    max-width: 400px;
    width: 90vw;
    opacity: 0;
    visibility: hidden;
    transition: opacity 0.2s ease, visibility 0.2s ease;
    pointer-events: none;
  }

  .ref-popup.active {
    opacity: 1;
    visibility: visible;
    pointer-events: auto;
  }

  .ref-popup-header {
    padding: 0.8rem 1rem;
    border-bottom: 1px solid var(--border);
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  .ref-popup-title {
    font-family: var(--font-sans);
    font-size: 0.85rem;
    font-weight: 500;
    color: var(--fg);
  }

  .ref-popup-open {
    font-family: var(--font-mono);
    font-size: 0.6rem;
    color: var(--accent-gold);
    letter-spacing: 0.1em;
    text-transform: uppercase;
    background: none;
    border: 1px solid var(--border);
    padding: 0.25rem 0.6rem;
    cursor: pointer;
    transition: all 0.15s;
  }

  .ref-popup-open:hover {
    border-color: var(--accent-gold);
  }

  .ref-popup-body {
    padding: 1rem;
    font-family: var(--font-body);
    font-size: 0.85rem;
    color: var(--fg-dim);
    line-height: 1.6;
    max-height: 200px;
    overflow-y: auto;
  }

  /* Highlighted match inside the reference popup */
  .ref-highlight {
    background: rgba(201, 168, 76, 0.18);
    color: var(--accent-gold);
    padding: 0 2px;
    font-style: italic;
  }

  .ref-popup-meta {
    padding: 0.5rem 1rem;
    border-top: 1px solid var(--border);
    font-family: var(--font-mono);
    font-size: 0.58rem;
    color: var(--fg-muted);
    letter-spacing: 0.1em;
    text-transform: uppercase;
  }

  /* ═══════════════════════════════════════
     SIDE PANEL (open reference alongside)
     ═══════════════════════════════════════ */
  .side-panel {
    position: fixed;
    top: 0;
    right: 0;
    width: 42vw;
    max-width: 560px;
    height: 100vh;
    background: var(--side-bg);
    border-left: 2px solid var(--accent);
    z-index: 150;
    overflow-y: auto;
    transform: translateX(100%);
    transition: transform 0.3s ease;
  }

  .side-panel.active {
    transform: translateX(0);
  }

  .side-panel-header {
    position: sticky;
    top: 0;
    background: var(--side-bg);
    padding: 0.9rem 1.5rem;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
    z-index: 10;
  }

  .side-panel-close {
    font-family: var(--font-mono);
    font-size: 0.68rem;
    color: var(--fg-dim);
    background: none;
    border: 1px solid var(--border);
    padding: 0.3rem 0.7rem;
    cursor: pointer;
    letter-spacing: 0.08em;
    transition: all 0.15s;
  }

  .side-panel-close:hover {
    color: var(--fg);
    border-color: var(--fg-dim);
  }

  .side-panel-title {
    font-family: var(--font-sans);
    font-size: 0.9rem;
    font-weight: 500;
  }

  .side-panel-body {
    padding: 2rem 1.5rem;
    font-family: var(--font-body);
    font-size: 0.95rem;
    line-height: var(--line-height);
    color: var(--fg);
  }

  .side-panel-body p {
    margin-bottom: 1.2rem;
  }

  @media (max-width: 768px) {
    .side-panel {
      width: 100vw;
      max-width: 100vw;
    }
  }

  /* ═══════════════════════════════════════
     SCROLLBAR
     ═══════════════════════════════════════ */
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: var(--bg); }
  ::-webkit-scrollbar-thumb { background: var(--border-light); }
  ::-webkit-scrollbar-thumb:hover { background: var(--fg-muted); }

  /* ═══════════════════════════════════════
     FONT SIZE CONTROLS
     ═══════════════════════════════════════ */
  .font-size-controls {
    display: flex;
    gap: 0.25rem;
    align-items: center;
  }

  .font-btn {
    font-family: var(--font-mono);
    color: var(--fg-muted);
    background: none;
    border: 1px solid var(--border);
    width: 1.8rem;
    height: 1.8rem;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    transition: color 0.15s ease, border-color 0.15s ease;
    padding: 0;
    line-height: 1;
    user-select: none;
  }

  .font-btn:hover {
    color: var(--fg);
    border-color: var(--border-light);
  }

  .font-btn.font-decrease { font-size: 0.65rem; }
  .font-btn.font-increase { font-size: 0.85rem; }

  /* ═══════════════════════════════════════
     WIDE SCREEN READING (portrait / scroll)
     ═══════════════════════════════════════ */
  @media (min-width: 900px) {
    .reading-body {
      text-align: justify;
      hyphens: auto;
    }
  }

  @media (min-width: 1200px) {
    .reading-main { max-width: min(52rem, 92vw); }
    .reading-body { font-size: 1.1rem; }
  }

  /* ═══════════════════════════════════════
     BOOK MODE — landscape paginated layout
     ═══════════════════════════════════════ */

  /* ── Scroll mode defaults ── */

  /* Cover (illustration + diagram): normal block in scroll mode */
  .book-cover {
    margin-bottom: 2rem;
  }

  .book-cover .reading-illustration {
    margin-bottom: 1.5rem;
    border: 1px solid var(--border);
    background: var(--surface-illustration);
    padding: 1.5rem;
    max-height: 320px;
    overflow: hidden;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .book-cover .reading-illustration svg {
    width: 100%; max-height: 280px; height: auto;
  }

  /* In scroll mode the cover diagram is hidden (it stays in reading-body) */
  .book-cover .cover-diagram { display: none; }

  /* Inline diagram in body (scroll mode) */
  .reading-diagram {
    break-inside: avoid;
    margin: 2rem auto;
    text-align: center;
    max-width: 40rem;
  }

  .reading-diagram img {
    width: 100%; max-width: 100%; display: block;
  }

  /* Stage (text content): normal block in scroll mode */
  .book-stage { position: relative; }

  .book-spread { position: relative; }

  /* Text content: no columns in scroll mode */
  .book-content { }

  /* Folio and click zones hidden by default */
  .book-folio {
    display: none;
    height: 2rem;
    align-items: center;
    justify-content: space-between;
    padding: 0 2.5rem;
    border-top: 1px solid var(--border);
    font-family: var(--font-mono);
    font-size: 0.58rem;
    color: var(--fg-muted);
    letter-spacing: 0.14em;
    text-transform: uppercase;
    flex-shrink: 0;
  }

  .book-dots { display: flex; gap: 5px; align-items: center; }

  .book-dot {
    width: 4px; height: 4px;
    border-radius: 50%;
    background: var(--border-light);
    transition: background 0.2s;
  }

  .book-dot.active { background: var(--fg-dim); }

  .book-click {
    display: none;
    position: absolute;
    top: 0; bottom: 0;
    width: 15%;
    z-index: 5;
    align-items: center;
    cursor: pointer;
    opacity: 0;
    transition: opacity 0.2s;
  }

  .book-click:hover { opacity: 1; }
  .book-click-prev { left: 0;  justify-content: flex-start; padding-left: 1rem; }
  .book-click-next { right: 0; justify-content: flex-end;   padding-right: 1rem; }

  .book-click-prev::after,
  .book-click-next::after {
    font-family: var(--font-mono);
    font-size: 1rem;
    color: var(--fg-muted);
    background: var(--bg-card);
    border: 1px solid var(--border);
    width: 2rem; height: 2rem;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .book-click-prev::after { content: '←'; }
  .book-click-next::after { content: '→'; }

  /* ── Active book mode ── */

  .reading-overlay.book-mode {
    overflow: hidden;
    display: flex;
    flex-direction: column;
  }

  .reading-overlay.book-mode .reading-nav {
    position: relative;
    flex-shrink: 0;
  }

  .reading-overlay.book-mode .reading-container {
    flex: 1;
    padding: 0;
    display: flex;
    overflow: hidden;
    gap: 0;
  }

  .reading-overlay.book-mode .reading-main {
    max-width: 100%;
    width: 100%;
    height: 100%;
    position: relative; /* cover and stage are absolute inside */
    padding: 0;
    background: none;
    border: none;
    border-radius: 0;
    box-shadow: none;
    backdrop-filter: none;
  }

  /* Cover: full-screen spread showing centered illustration */
  .reading-overlay.book-mode .book-cover {
    position: absolute;
    inset: 0;
    margin: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 2rem;
    background: var(--bg);
    transition: opacity 0.3s;
    z-index: 2;
  }

  .reading-overlay.book-mode .book-cover.book-hidden {
    opacity: 0;
    pointer-events: none;
    z-index: 0;
  }

  .reading-overlay.book-mode .book-cover .reading-illustration {
    flex: 0 0 auto;
    max-width: min(90%, calc(80vh * 1.6));
    max-height: 80vh;
    margin: 0;
    border: 1px solid var(--border);
    background: var(--surface-illustration);
    padding: 1.5rem;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
  }

  .reading-overlay.book-mode .book-cover .reading-illustration svg {
    width: 100%; max-height: 72vh; height: auto;
  }

  /* Text stage: full-screen, overflow hidden for multicol */
  .reading-overlay.book-mode .book-stage {
    position: absolute;
    inset: 0;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    align-items: center;
    transition: opacity 0.3s;
  }

  .reading-overlay.book-mode .book-stage.book-hidden {
    opacity: 0;
    pointer-events: none;
  }

  .reading-overlay.book-mode .book-spread {
    position: relative;
    flex: 1;
    width: 100%;
    height: 100%;
    overflow: hidden;
    margin: 0 auto;
  }

  /* Multicol text content — no column-span elements, text starts at y=0 */
  .reading-overlay.book-mode .book-content {
    position: absolute;
    top: 0;
    left: 0;
    box-sizing: border-box;
    max-width: none;
    padding: 2.4rem 2.8rem 2.9rem;
    text-align: justify;
    hyphens: auto;
    transition: transform 0.38s cubic-bezier(0.4, 0, 0.2, 1);
    will-change: transform;
    column-rule: 1px solid var(--border);
    overflow-wrap: break-word;
    word-break: normal;
  }

  .reading-overlay.book-mode .book-content p { break-inside: avoid; }

  .reading-overlay.book-mode .reading-meta-block {
    break-inside: avoid-column;
  }

  /* Hide inline diagram from body in book mode (it's on the cover) */
  .reading-overlay.book-mode .reading-body .reading-diagram { display: none; }

  .reading-overlay.book-mode .book-folio { display: flex; }
  .reading-overlay.book-mode .book-click { display: flex; }

  /* ═══════════════════════════════════════
     FOOTER
     ═══════════════════════════════════════ */
  .site-footer {
    border-top: 1px solid var(--border);
    background: var(--footer-bg);
    backdrop-filter: blur(8px);
    padding: 1.5rem 2rem;
    text-align: center;
    font-family: var(--font-mono);
    font-size: 0.6rem;
    color: var(--fg-muted);
    letter-spacing: 0.15em;
    text-transform: uppercase;
  }

  /* ═══════════════════════════════════════
     DIAGRAM MODAL
     ═══════════════════════════════════════ */
  .diagram-modal {
    display: none;
    position: fixed;
    inset: 0;
    z-index: 9999;
    background: var(--diagram-modal-bg);
    align-items: center;
    justify-content: center;
    cursor: pointer;
  }

  .diagram-modal.active {
    display: flex;
  }

  .diagram-modal img {
    max-width: 96vw;
    max-height: 92vh;
    object-fit: contain;
    border: 1px solid var(--border);
    cursor: default;
  }

  .diagram-modal-close {
    position: absolute;
    top: 1.2rem;
    right: 1.4rem;
    background: none;
    border: 1px solid var(--border-light);
    color: var(--fg-muted);
    font-family: var(--font-mono);
    font-size: 0.75rem;
    letter-spacing: 0.1em;
    padding: 0.3rem 0.7rem;
    cursor: pointer;
    text-transform: uppercase;
  }

  .diagram-modal-close:hover {
    color: var(--fg);
    border-color: var(--fg-dim);
  }

  .reader-rail {
    position: fixed;
    top: 50%;
    right: 0.9rem;
    transform: translateY(-50%);
    z-index: 320;
    display: flex;
    flex-direction: column;
    gap: 0.45rem;
    padding: 0.45rem;
    background: var(--reader-rail-bg);
    border: 1px solid var(--reader-rail-border);
    border-radius: 999px;
    box-shadow: var(--reader-rail-shadow);
    backdrop-filter: blur(12px);
  }

  .theme-pixel {
    appearance: none;
    width: 1.2rem;
    height: 1.2rem;
    border: 0;
    padding: 0;
    background: transparent;
    cursor: pointer;
    position: relative;
    border-radius: 0.35rem;
    outline: none;
    transition:
      transform 0.18s ease,
      background 0.32s ease,
      background-color 0.32s ease,
      border-color 0.32s ease,
      box-shadow 0.32s ease;
  }

  .theme-pixel::before {
    content: '';
    position: absolute;
    top: 50%;
    left: 50%;
    width: 4px;
    height: 4px;
    transform: translate(-50%, -50%);
    image-rendering: pixelated;
  }

  .theme-pixel::after {
    content: '';
    position: absolute;
    inset: 1px;
    border: 1px solid transparent;
    border-radius: 0.28rem;
    opacity: 0;
  }

  .theme-pixel[data-reader-theme="ballard"]::before {
    background: #b85185;
    box-shadow:
      -4px -4px 0 #f4ead9,
      4px -4px 0 #5a3275,
      -4px 0 0 #cab19b,
      4px 0 0 #d2614e,
      0 4px 0 #a39058,
      4px 4px 0 #66724f;
  }

  .theme-pixel[data-reader-theme="paper"]::before {
    background: #101010;
    box-shadow:
      -4px -4px 0 #fffdf7,
      4px -4px 0 #d3c7b9,
      -4px 0 0 #f8f4ed,
      4px 0 0 #8a7a68,
      0 4px 0 #7f8573,
      4px 4px 0 #6b6470;
  }

  .theme-pixel[data-reader-theme="night"]::before {
    background: #39efff;
    box-shadow:
      -4px -4px 0 #f2fbff,
      4px -4px 0 #7b6fff,
      -4px 0 0 #040608,
      4px 0 0 #ff5aa2,
      0 4px 0 #ffd76b,
      4px 4px 0 #46ffb5;
  }

  .theme-pixel:hover {
    transform: translateY(-1px);
  }

  .theme-pixel:focus-visible::after,
  .theme-pixel[aria-pressed="true"]::after {
    opacity: 1;
    border-color: var(--accent);
  }

  .theme-pixel[aria-pressed="true"] {
    background: rgba(184, 81, 133, 0.12);
  }

  html[data-theme="paper"] .theme-pixel[aria-pressed="true"] {
    background: rgba(16, 16, 16, 0.06);
  }

  html[data-theme="night"] .theme-pixel[aria-pressed="true"] {
    background: rgba(57, 239, 255, 0.12);
    box-shadow: 0 0 12px rgba(57, 239, 255, 0.12);
  }

  @media (orientation: portrait) and (max-width: 1100px) {
    .reader-rail {
      top: auto;
      right: 0.9rem;
      bottom: 0.9rem;
      left: auto;
      transform: none;
      display: inline-flex;
      flex-direction: row;
      align-items: center;
      justify-content: center;
      gap: 0.35rem;
      padding: 0.4rem 0.5rem;
      width: auto;
      height: auto;
      max-width: calc(100vw - 1.8rem);
      max-height: none;
      border-radius: 0.95rem;
    }

    .theme-pixel {
      flex: 0 0 auto;
    }
  }
</style>
</head>

/* ═══════════════════════════════════════════════════════════
   MERCURIO EN LOS ENGRANAJES — Motor Zettelkasten
   ═══════════════════════════════════════════════════════════
   Para agregar una nueva entrada:
     1. Crear entries/Z-XXX.md  (ver Z-001.md como modelo)
     2. Crear illustrations/Z-XXX.svg
     3. Agregar 'Z-XXX' al array ENTRY_IDS aquí abajo
   ─────────────────────────────────────────────────────────
   Nota: requiere servidor HTTP para previsualizar localmente.
   VS Code → Live Server, o: python -m http.server 8000
   ═══════════════════════════════════════════════════════════ */

// Usa el nombre completo del archivo MD (sin extensión).
// El prefijo Z-XXX se extrae automáticamente para encontrar la ilustración.
const ENTRY_IDS = [
  'Z-001_la-estacion-intermedia',
  'Z-002_el-muzak'
];
let ZETTELS = [];
const THEME_STORAGE_KEY = 'readerTheme';
const READER_THEMES = new Set(['ballard', 'paper', 'night']);

function getSavedTheme() {
  try {
    const saved = localStorage.getItem(THEME_STORAGE_KEY);
    return READER_THEMES.has(saved) ? saved : 'ballard';
  } catch {
    return 'ballard';
  }
}

function storeTheme(theme) {
  try {
    localStorage.setItem(THEME_STORAGE_KEY, theme);
  } catch {
    // Ignore storage failures and keep the session theme only.
  }
}

function applyTheme(theme) {
  const nextTheme = READER_THEMES.has(theme) ? theme : 'ballard';
  document.documentElement.dataset.theme = nextTheme;
  document.querySelectorAll('.theme-pixel').forEach(button => {
    button.setAttribute('aria-pressed', button.dataset.readerTheme === nextTheme ? 'true' : 'false');
  });
  storeTheme(nextTheme);
}

function initThemeSelector() {
  applyTheme(getSavedTheme());
  document.querySelectorAll('.theme-pixel').forEach(button => {
    button.addEventListener('click', () => {
      applyTheme(button.dataset.readerTheme);
    });
  });
}

/* ── Frontmatter parser ─────────────────────────────────── */
function parseFrontmatter(text) {
  const m = text.match(/^---\r?\n([\s\S]*?)\r?\n---\r?\n([\s\S]*)$/);
  if (!m) return { fm: {}, body: text };
  const fm = {};
  m[1].split('\n').forEach(line => {
    const kv = line.match(/^(\w+):\s*(.*)/);
    if (!kv) return;
    let val = kv[2].trim().replace(/^["']|["']$/g, '');
    if (val.startsWith('[') && val.endsWith(']'))
      val = val.slice(1, -1).split(',').map(s => s.trim()).filter(Boolean);
    fm[kv[1]] = val;
  });
  return { fm, body: m[2] };
}

/* ── WikiLink parser: [[Z-002|texto]] → <a> cross-ref ───── */
function parseWikilinks(text) {
  return text.replace(/\[\[([A-Z]-\d+)\|([^\]]+)\]\]/g,
    (_, id, label) => `<a class="zettel-link" data-ref="${id}">${label}</a>`);
}

/* ── Default illustration fallback ─────────────────────── */
function defaultIllustration() {
  return `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 200" shape-rendering="crispEdges">
    <rect width="320" height="200" fill="#151114"/>
    <rect x="144" y="84" width="32" height="32" fill="#2a2025"/>
    <rect x="136" y="92" width="8" height="16" fill="#45373c"/>
    <rect x="176" y="92" width="8" height="16" fill="#45373c"/>
    <rect x="152" y="76" width="16" height="8" fill="#45373c"/>
    <rect x="152" y="116" width="16" height="8" fill="#45373c"/>
    <rect x="156" y="92" width="8" height="8" fill="#b85185"/>
  </svg>`;
}

/* ── Load a single entry from MD + SVG files ────────────── */
async function loadEntry(id) {
  try {
    // Extract Z-XXX prefix for the illustration (e.g. 'Z-002_el-muzak' → 'Z-002')
    const svgId = id.match(/^Z-\d+/)?.[0] || id;

    const [mdRes, svgRes] = await Promise.all([
      fetch(`entries/${id}.md`),
      fetch(`illustrations/${svgId}.svg`)
    ]);
    if (!mdRes.ok) throw new Error(`entries/${id}.md not found`);

    const mdText  = await mdRes.text();
    const svgText = svgRes.ok ? await svgRes.text() : defaultIllustration();
    const { fm, body } = parseFrontmatter(mdText);

    let cleanBody = body.replace(/^#[^\n]+\n+/, ''); // strip H1 (in frontmatter)
    cleanBody = parseWikilinks(cleanBody);            // convert [[id|text]] before marked
    const bodyHtml = marked.parse(cleanBody);

    const links = Array.isArray(fm.links) ? fm.links
                : (fm.links && fm.links !== '[]') ? [fm.links] : [];

    return {
      id:           fm.id || id,
      title:        fm.title || id,
      date:         fm.date || '',
      location:     fm.location || '',
      excerpt:      fm.excerpt || cleanBody.replace(/<[^>]*>/g,'').slice(0, 220) + '…',
      body:         bodyHtml,
      links,
      illustration: svgText,
      diagram:      fm.diagram || ''
    };
  } catch (err) {
    console.warn(`[Zettelkasten] No se pudo cargar ${id}:`, err);
    return null;
  }
}

/* ── FIND RELEVANT PASSAGE ──────────────────────────────── */
// Searches the entry's body for the passage most related to the link label.
// Falls back to last paragraph if no exact/word match is found.
function findRelevantPassage(bodyHtml, linkLabel) {
  const tmp = document.createElement('div');
  tmp.innerHTML = bodyHtml;
  const text  = tmp.textContent || '';
  const lower = text.toLowerCase();
  const label = (linkLabel || '').toLowerCase().trim();

  let idx = -1, term = '';

  // 1. Try full phrase
  idx = lower.indexOf(label);
  if (idx >= 0) { term = label; }

  // 2. Try each significant word, longest first
  if (idx < 0) {
    const words = label.split(/\s+/)
      .filter(w => w.length > 3)
      .sort((a, b) => b.length - a.length);
    for (const w of words) {
      const i = lower.indexOf(w);
      if (i >= 0) { idx = i; term = w; break; }
    }
  }

  let start, end;

  if (idx >= 0) {
    // Expand to containing sentence
    const before = text.lastIndexOf('. ', idx);
    start = before >= 0 ? before + 2 : Math.max(0, idx - 120);
    const after  = text.indexOf('. ', idx + term.length);
    end   = after  >= 0 ? after + 1  : Math.min(text.length, idx + term.length + 140);
  } else {
    // Fallback: last paragraph (most thematically dense)
    const lastBreak = Math.max(text.lastIndexOf('\n\n'), text.lastIndexOf('. ', text.length - 80));
    start = lastBreak >= 0 ? lastBreak + 2 : Math.max(0, text.length - 320);
    end   = text.length;
  }

  let passage = (start > 2 ? '…' : '') + text.slice(start, end).trim();
  if (end < text.length) passage += '…';

  // Highlight the matched term
  if (term) {
    const re = new RegExp('(' + term.replace(/[.*+?^${}()|[\]\\]/g, '\\$&') + ')', 'gi');
    passage = passage.replace(re, '<span class="ref-highlight">$1</span>');
  }

  return passage || text.slice(0, 260) + '…';
}

/* ── REFERENCE POPUP ────────────────────────────────────── */
let currentRefId = null;

function showRefPopup(refId, event, linkLabel) {

}

/* ── HEADER DATE ────────────────────────────────────────── */
function setHeaderDate() {

/* ── HEADER ORNAMENT ────────────────────────────────────── */
function initHeaderOrnament() {
  const ornament = document.getElementById('headerOrnament');
  if (!ornament) return;

  const prefersReducedMotion = window.matchMedia('(prefers-reduced-motion: reduce)');
  if (prefersReducedMotion.matches) return;

  const updateParallax = event => {
    const rect = ornament.getBoundingClientRect();
    const x = ((event.clientX - rect.left) / rect.width - 0.5).toFixed(3);
    const y = ((event.clientY - rect.top) / rect.height - 0.5).toFixed(3);
    ornament.style.setProperty('--parallax-x', x);
    ornament.style.setProperty('--parallax-y', y);
  };

  ornament.addEventListener('pointermove', updateParallax);
  ornament.addEventListener('pointerleave', () => {
    ornament.style.setProperty('--parallax-x', '0');
    ornament.style.setProperty('--parallax-y', '0');
  });

  const motionPath = document.getElementById('pinballMotionPath');
  const ball = document.getElementById('headerPinballBall');
  const fill = document.getElementById('accumulatorFill');
  const surface = document.getElementById('accumulatorSurface');
  const speedReadout = document.getElementById('headerSpeedReadout');
  const statusNeedle = document.getElementById('statusNeedle');
  const plungerKnob = document.getElementById('plungerKnob');
  const flipperLeft = document.getElementById('flipperLeft');
  const flipperRight = document.getElementById('flipperRight');

  if (!motionPath || !ball || !fill || !surface || !speedReadout || !statusNeedle || !plungerKnob || !flipperLeft || !flipperRight) return;

  const lamps = Array.from(ornament.querySelectorAll('.lamp')).map(el => ({
    el,
    x: parseFloat(el.dataset.x || '0'),
    y: parseFloat(el.dataset.y || '0')
  }));

  const bumpers = [
    { el: document.getElementById('bumperA'), x: 214, y: 176 },
    { el: document.getElementById('bumperB'), x: 342, y: 130 },
    { el: document.getElementById('bumperC'), x: 452, y: 186 }
  ].filter(item => item.el);

  const gears = Array.from(ornament.querySelectorAll('.pinball-gear')).map(el => ({
    el,
    base: el.dataset.base || '',
    speed: parseFloat(el.dataset.speed || '0.05')
  }));

  const totalLength = motionPath.getTotalLength();
  const clamp = (value, min, max) => Math.max(min, Math.min(max, value));
  const tankTop = 136;
  const tankBottom = 268;
  const tankHeight = tankBottom - tankTop;
  let distance = 0;
  let lastTime = performance.now();

  const speedFor = (u, now) => {
    if (u < 0.08) return 340;
    if (u < 0.2) return 168 + 18 * Math.sin(now * 0.006);
    if (u < 0.38) return 242 + 22 * Math.sin(now * 0.014);
    if (u < 0.54) return 182 + 16 * Math.cos(now * 0.01);
    if (u < 0.74) return 214 + 28 * Math.sin(now * 0.012);
    if (u < 0.9) return 156 + 14 * Math.cos(now * 0.008);
    return 296;
  };

  const animate = now => {
    const dt = Math.min((now - lastTime) / 1000, 0.03);
    lastTime = now;

    const u = distance / totalLength;
    const speed = speedFor(u, now);
    distance = (distance + speed * dt) % totalLength;

    const point = motionPath.getPointAtLength(distance);
    ball.setAttribute('transform', `translate(${point.x.toFixed(1)} ${point.y.toFixed(1)})`);

    const power = clamp((speed - 140) / 210, 0, 1);
    const fillRatio = clamp(0.88 - power * 0.58 + 0.04 * Math.sin(now * 0.0038), 0.16, 0.92);
    const fillHeight = tankHeight * fillRatio;
    const fillY = tankBottom - fillHeight;
    fill.setAttribute('y', fillY.toFixed(1));
    fill.setAttribute('height', fillHeight.toFixed(1));
    if (surface.tagName.toLowerCase() === 'rect') {
      surface.setAttribute('y', Math.max(tankTop, fillY - 4).toFixed(1));
    } else {
      surface.setAttribute('cy', fillY.toFixed(1));
    }

    speedReadout.textContent = `${Math.round(speed)}`;
    statusNeedle.setAttribute('transform', `rotate(${(-76 + power * 152).toFixed(2)} 96 32)`);

    const plungerTravel = u < 0.06 ? 10 * (1 - u / 0.06) : 0;
    plungerKnob.setAttribute('cy', (300 - plungerTravel).toFixed(1));

    const leftKick = clamp(1 - Math.hypot(point.x - 280, point.y - 292) / 108, 0, 1);
    const rightKick = clamp(1 - Math.hypot(point.x - 400, point.y - 292) / 108, 0, 1);
    flipperLeft.setAttribute('transform', `translate(280 292) rotate(${(-24 + leftKick * 11).toFixed(2)})`);
    flipperRight.setAttribute('transform', `translate(400 292) rotate(${(24 - rightKick * 11).toFixed(2)})`);

    lamps.forEach((lamp, idx) => {
      const dist = Math.hypot(point.x - lamp.x, point.y - lamp.y);
      const hit = clamp(1 - dist / 88, 0, 1);
      const pulse = 0.08 + 0.05 * Math.sin(now * 0.005 + idx * 0.8);
      const scale = 1 + hit * 0.12;
      lamp.el.style.opacity = (0.12 + pulse + hit * 0.56).toFixed(3);
      lamp.el.setAttribute('transform', `translate(${lamp.x} ${lamp.y}) scale(${scale.toFixed(3)})`);
    });

    bumpers.forEach((bumper, idx) => {
      const dist = Math.hypot(point.x - bumper.x, point.y - bumper.y);
      const glow = clamp(1 - dist / 92, 0, 1);
      const scale = 1 + glow * 0.05 + 0.01 * Math.sin(now * 0.01 + idx);
      bumper.el.setAttribute('transform', `translate(${bumper.x} ${bumper.y}) scale(${scale.toFixed(3)})`);
    });

    gears.forEach((gear, idx) => {
      const angle = now * gear.speed * (0.42 + power * 0.92);
      gear.el.setAttribute('transform', `${gear.base} rotate(${(angle + idx * 18).toFixed(2)})`);
    });

    requestAnimationFrame(animate);
  };

  requestAnimationFrame(animate);
}

/* ── FONT SIZE CONTROLS ─────────────────────────────────── */
const FONT_SIZES = [0.9, 1.05, 1.18, 1.35, 1.52]; // rem values
let fontSizeIdx = parseInt(localStorage.getItem('readingFontIdx') || '2'); // default: index 2

function applyFontSize() {
  // Apply directly to .reading-body so it overrides any CSS rem-based font-size
  document.querySelectorAll('.reading-body').forEach(el => {
    el.style.fontSize = FONT_SIZES[fontSizeIdx] + 'rem';
  });
}

function adjustFontSize(delta) {
  fontSizeIdx = Math.max(0, Math.min(FONT_SIZES.length - 1, fontSizeIdx + delta));
  localStorage.setItem('readingFontIdx', fontSizeIdx);
  applyFontSize();
  // Recalculate book layout if active (font size changes column count)
  if (document.getElementById('readingOverlay').classList.contains('book-mode')) {
    setupBookReader();
  }
}

/* ── BOOK MODE ────────────────────────────────────────────── */
let bookPage = 0;
let bookTotalPages = 1;
let bookSpreadWidth = 0;
let bookStepWidth = 0;

function isBookMode() {
  // Landscape and wide enough for two columns
  return window.innerWidth >= 900 && window.innerWidth > window.innerHeight;
}

function setupBookReader() {
  const overlay = document.getElementById('readingOverlay');
  const stage   = document.getElementById('bookStage');
  const spread  = document.getElementById('bookSpread');
  const content = document.getElementById('bookContent');

  if (!stage || !spread || !content) return;

  if (!isBookMode()) {
    overlay.classList.remove('book-mode');
    spread.style.cssText = '';
    content.style.cssText = '';
    bookSpreadWidth = 0;
    bookStepWidth = 0;
    return;
  }

  overlay.classList.add('book-mode');

  requestAnimationFrame(() => {
    const stageW = stage.clientWidth;
    const stageH = stage.clientHeight;
    const rootFs = parseFloat(getComputedStyle(document.documentElement).fontSize);
    const clampValue = (value, min, max) => Math.max(min, Math.min(max, value));
    const basePadX = Math.round(clampValue(stageW * 0.04, rootFs * 2.1, rootFs * 4.4));
    const padTop = Math.round(clampValue(stageH * 0.05, rootFs * 1.5, rootFs * 3));
    const padBottom = Math.round(clampValue(stageH * 0.065, rootFs * 2, rootFs * 3.6));
    const gap = Math.round(clampValue(rootFs * 3, 26, 56));
    const pageInset = Math.round(clampValue(rootFs * 1.4, 18, 34));
    const usableW = stageW - basePadX * 2 - pageInset * 2;
    const minColW = Math.round(rootFs * 20);
    const maxColW = Math.round(rootFs * 28);
    const colW = clampValue(Math.floor((usableW - gap) / 2), minColW, maxColW);
    const spreadCoreWidth = colW * 2 + gap + pageInset * 2;
    const spreadHeight = stageH;

    spread.style.width = spreadCoreWidth + 'px';
    spread.style.height = spreadHeight + 'px';
    content.style.width = spreadCoreWidth + 'px';
    content.style.height = spreadHeight + 'px';
    content.style.left = '0px';
    content.style.padding = `${padTop}px ${pageInset}px ${padBottom}px`;
    content.style.columnWidth = `${colW}px`;
    content.style.columnGap = `${gap}px`;
    content.style.columnFill = 'auto';

    requestAnimationFrame(() => {
      bookSpreadWidth = spreadCoreWidth;
      bookStepWidth = 2 * (colW + gap);
      const columnCount = Math.max(1, Math.ceil((content.scrollWidth - pageInset * 2 + gap) / (colW + gap)));
      const textSpreads = Math.max(1, Math.ceil(columnCount / 2));
      bookTotalPages = 1 + textSpreads;
      bookPage = Math.min(bookPage, bookTotalPages - 1);
      updateBookDisplay();
    });
  });
}

function updateBookDisplay() {
  const content = document.getElementById('bookContent');
  const stage   = document.getElementById('bookStage');
  const cover   = document.getElementById('bookCover');
  if (!content || !stage) return;

  if (document.getElementById('readingOverlay').classList.contains('book-mode')) {
    const onCover = bookPage === 0;
    if (cover) cover.classList.toggle('book-hidden', !onCover);
    stage.classList.toggle('book-hidden', onCover);
    if (onCover) {
      content.style.transform = 'translateX(0px)';
    } else {
      const stepWidth = bookStepWidth || bookSpreadWidth || stage.clientWidth || stage.offsetWidth;
      content.style.transform = `translateX(${-(bookPage - 1) * stepWidth}px)`;
    }
  }

  const label = document.getElementById('bookPageLabel');
  const dots  = document.getElementById('bookDots');
  const right = document.getElementById('bookTitleLabel');

  if (label) label.textContent = `${bookPage + 1} / ${bookTotalPages}`;
  if (right)  right.textContent = document.getElementById('readingEntryId')?.textContent || '';

  if (dots) {
    const n = Math.min(bookTotalPages, 20);
    dots.innerHTML = Array.from({length: n}, (_, i) =>
      `<span class="book-dot${i === bookPage ? ' active' : ''}"></span>`
    ).join('');
  }
}

function bookNext() {
  if (bookPage < bookTotalPages - 1) { bookPage++; updateBookDisplay(); }
}

function bookPrev() {
  if (bookPage > 0) { bookPage--; updateBookDisplay(); }
}

/* ── Recalculate on resize ──────────────────────────────── */
window.addEventListener('resize', () => {
  if (document.getElementById('readingOverlay').classList.contains('active')) {
    setupBookReader();
  }
});

if (document.fonts?.ready) {
  document.fonts.ready.then(() => {
    if (document.getElementById('readingOverlay').classList.contains('active')) {
      setupBookReader();
    }
  });
}

/* ── INIT — async entry loading ─────────────────────────── */
async function init() {
  initThemeSelector();
  setHeaderDate();
  initHeaderOrnament();

  const grid = document.getElementById('zettelGrid');
  grid.innerHTML = `<div style="color:var(--fg-muted);font-family:var(--font-mono);
    font-size:0.68rem;letter-spacing:0.14em;padding:2rem 0;
    grid-column:1/-1;text-transform:uppercase;">Cargando fragmentos…</div>`;

  const results = await Promise.all(ENTRY_IDS.map(loadEntry));
  ZETTELS = results.filter(Boolean);
  renderGrid();
}

init();
</script>
